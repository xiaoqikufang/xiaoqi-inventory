          <div class="stat-info"><h4>${list.length}</h4><p>开票总数</p></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green">💰</div>
          <div class="stat-info"><h4>${fmtMoney(totalInvoiced)}</h4><p>已开票金额</p></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon orange">📝</div>
          <div class="stat-info"><h4>${fmtMoney(pendingInvoice)}</h4><p>待开票金额</p></div>
        </div>
      </div>

      <div class="toolbar">
        <h3 style="margin:0;">开票记录</h3>
        <button class="btn btn-primary" onclick="openInvoiceForm()">+ 新增开票</button>
      </div>
      <div class="card" style="padding:0;">
        <div class="table-wrapper">
          <table>
            <thead><tr><th>发票号</th><th>客户</th><th>开票日期</th><th>金额</th><th>税率</th><th>税额</th><th>状态</th><th>操作</th></tr></thead>
            <tbody>${list.length ? list.map(inv => `<tr>
              <td><strong>${inv.invoiceNo}</strong></td><td>${inv.customer}</td>
              <td>${fmtDate(inv.invoiceDate)}</td><td>${fmtMoney(inv.amount)}</td>
              <td>${inv.taxRate}%</td><td>${fmtMoney(inv.taxAmount)}</td>
              <td>${statusBadge(inv.status)}</td>
              <td class="table-actions">
                <button class="btn btn-sm btn-outline" onclick="viewInvoice('${inv.id}')">详情</button>
                <button class="btn btn-sm btn-danger" onclick="deleteInvoice('${inv.id}')">删除</button>
              </td>
            </tr>`).join('') : '<tr><td colspan="8"><div class="empty-state"><p>暂无开票记录</p></div></td></tr>'}</tbody>
          </table>
        </div>
      </div>
    `;
  }

  window.openInvoiceForm = function() {
    const custs = DB.get('customers');
    const orderNo = 'INV' + today().replace(/-/g,'').slice(2) + String(invoices.length+1).padStart(3,'0');
    openModal('新增开票', `
      <div class="form-row">
        <div class="form-group"><label>发票号码 <span class="required">*</span></label><input class="form-control" id="invNo" value="${orderNo}"></div>
        <div class="form-group"><label>开票日期 <span class="required">*</span></label><input class="form-control" id="invDate" type="date" value="${today()}"></div>
      </div>
      <div class="form-group"><label>客户名称 <span class="required">*</span></label>
        <select class="form-control" id="invCustomer">
          <option value="">请选择</option>
          ${custs.map(c => `<option value="${c.name}" data-tax="${c.taxId||''}">${c.name}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label>购方纳税识别号</label><input class="form-control" id="invTaxId" readonly></div>
      <div class="form-row">
        <div class="form-group"><label>金额（不含税）<span class="required">*</span></label><input class="form-control" id="invAmount" type="number" step="0.01" oninput="calcInvTax()"></div>
        <div class="form-group"><label>税率</label>
          <select class="form-control" id="invTaxRate" onchange="calcInvTax()">
            <option value="13">13%</option>
            <option value="9">9%</option>
            <option value="6">6%</option>
            <option value="3">3%</option>
            <option value="1">1%</option>
            <option value="0">0%</option>
          </select>
        </div>
        <div class="form-group"><label>税额</label><input class="form-control" id="invTaxAmount" readonly style="font-weight:600;color:var(--danger);"></div>
      </div>
      <div class="form-group"><label>价税合计</label><input class="form-control" id="invTotal" readonly style="font-weight:700;font-size:16px;color:var(--primary);"></div>
      <div class="form-group"><label>关联销售单</label>
        <select class="form-control" id="invSaleOrder">
          <option value="">不关联</option>
          ${sales.filter(s => (s.status==='shipped'||s.status==='completed') && !invoicedSaleIds.has(s.id)).map(s => `<option value="${s.id}">${s.orderNo} - ${s.customer} (${fmtMoney(s.totalAmount)})</option>`).join('')}
          ${sales.filter(s => s.status==='pending'||s.status==='approved').length ? `<optgroup label="--- 未发货 ---">${sales.filter(s => (s.status==='pending'||s.status==='approved') && !invoicedSaleIds.has(s.id)).map(s => `<option value="${s.id}">${s.orderNo} - ${s.customer} (${fmtMoney(s.totalAmount)})</option>`).join('')}</optgroup>` : ''}
        </select>
      </div>
      <div class="form-group"><label>备注</label><textarea class="form-control" id="invRemark" rows="2"></textarea></div>
    `, `<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveInvoice()">保存</button>`);

    // 客户选择后自动填充税号
    setTimeout(() => {
      $('invCustomer').addEventListener('change', function() {
        const opt = this.options[this.selectedIndex];
        $('invTaxId').value = opt.dataset.tax || '';
      });
    }, 50);
  };

  window.calcInvTax = function() {
    const amount = Number($('invAmount').value)||0;
    const rate = Number($('invTaxRate').value)||0;
    const taxAmount = amount * rate / 100;
    $('invTaxAmount').value = fmtMoney(taxAmount);
    $('invTotal').value = fmtMoney(amount + taxAmount);
  };

  window.saveInvoice = function() {
    const amount = Number($('invAmount').value)||0;
    const rate = Number($('invTaxRate').value)||0;
    const taxAmount = amount * rate / 100;
    const customer = $('invCustomer').value;
    if(!customer) return toast('请选择客户','error');
    if(amount <= 0) return toast('请输入金额','error');

    DB.add('invoices', {
      invoiceNo: $('invNo').value.trim(),
      invoiceDate: $('invDate').value,
      customer,
      taxId: $('invTaxId').value.trim(),
      amount, taxRate: rate, taxAmount,
      totalAmount: amount + taxAmount,
      saleOrderId: $('invSaleOrder').value || null,
      remark: $('invRemark').value.trim(),
      status: 'invoiced'
    });

    // 如果关联了销售单，更新状态
    const saleId = $('invSaleOrder').value;
    if(saleId) DB.update('sales', saleId, { status: 'invoiced' });

    closeModal(); toast('开票信息已保存'); render();
  };

  window.viewInvoice = function(id) {
    const inv = DB.find('invoices', id);
    openModal('发票详情 - ' + inv.invoiceNo, `
      <div style="padding:16px;border:2px solid var(--primary);border-radius:8px;">
        <div style="text-align:center;margin-bottom:16px;">
          <h2 style="color:var(--primary);">发票信息</h2>
          <p style="color:var(--text-secondary);">发票号码：${inv.invoiceNo}</p>
        </div>
        <div class="form-row" style="margin-bottom:12px;">
          <div><strong>客户名称：</strong>${inv.customer}</div>
          <div><strong>纳税识别号：</strong>${inv.taxId||'-'}</div>
        </div>
        <div class="form-row">
          <div><strong>开票日期：</strong>${fmtDate(inv.invoiceDate)}</div>
          <div><strong>税率：</strong>${inv.taxRate}%</div>
        </div>
        <hr style="margin:16px 0;border:none;border-top:1px solid var(--border);">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
          <span>金额（不含税）</span><span>${fmtMoney(inv.amount)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
          <span>税额</span><span style="color:var(--danger);">${fmtMoney(inv.taxAmount)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:18px;font-weight:700;padding-top:8px;border-top:2px solid var(--text);">
          <span>价税合计</span><span style="color:var(--primary);">${fmtMoney(inv.totalAmount)}</span>
        </div>
        ${inv.remark ? `<div style="margin-top:16px;font-size:12px;color:var(--text-secondary);">备注：${inv.remark}</div>` : ''}
      </div>
    `, `<button class="btn btn-outline" onclick="closeModal()">关闭</button>
        <button class="btn btn-primary" onclick="printInvoiceContent()">🖨️ 打印</button>`);
  };

  window.printInvoiceContent = function() { window.print(); };
  window.deleteInvoice = function(id) {
    showConfirm('删除发票记录','此操作不可恢复，关联的销售单将回退为已发货状态', () => {
      const inv = DB.find('invoices', id);
      if(inv.saleOrderId) {
        const so = DB.find('sales', inv.saleOrderId);
        if(so && so.status === 'invoiced') DB.update('sales', inv.saleOrderId, { status: 'shipped' });
      }
      DB.remove('invoices',id); toast('已删除'); render();
    }, '🗑️');
  };

  render();
}

window.exportData = function() {
  const json = DB.exportAll();
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const now = new Date();
  const dateStr = now.getFullYear() + '' + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');
  a.download = '小七库存_备份_' + dateStr + '.json';
  a.click();
  URL.revokeObjectURL(url);
  localStorage.setItem('erm_lastBackup', now.toLocaleString('zh-CN'));
  toast('数据已导出', 'success');
  renderSettings($('mainContent'));
};

window.importData = function(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const json = e.target.result;
      // 验证格式
      const data = JSON.parse(json);
      const requiredKeys = ['products','warehouses','stock'];
      const hasRequired = requiredKeys.some(k => Array.isArray(data[k]));
      if (!hasRequired) {
        toast('文件格式不正确，请选择正确的备份文件', 'error');
        return;
      }
      showConfirm('确认恢复数据？当前数据将被替换为备份文件中的数据。', () => {
        DB.importAll(json);
        toast('数据恢复成功，即将刷新页面', 'success');
        setTimeout(() => location.reload(), 1500);
      });
    } catch (err) {
      toast('文件读取失败: ' + err.message, 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
};

window.clearAllData = function() {
  showConfirm('⚠️ 确认清空所有数据？此操作不可撤销！\n\n建议先导出备份。', () => {
    const keys = ['products','purchases','sales','outsource','production','invoices',
                  'stock','stockFlow','suppliers','customers','partners'];
    keys.forEach(k => DB.clear(k));
    toast('数据已清空', 'success');
    setTimeout(() => location.reload(), 1000);
  });
};

// ========== 初始化 ==========
document.addEventListener('DOMContentLoaded', () => {
  initDefaults();
  $('currentDate').textContent = new Date().toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric', weekday:'long' });

  // 侧边栏导航
  qsa('.nav-item').forEach(item => {
    item.addEventListener('click', () => navigateTo(item.dataset.page));
  });

  // 响应式
  function checkResponsive() {
    const menuBtn = $('menuBtn');
    if(window.innerWidth <= 768) { menuBtn.style.display = 'inline-flex'; }
    else { menuBtn.style.display = 'none'; $('sidebar').classList.remove('open'); }
  }
  window.addEventListener('resize', checkResponsive);
  checkResponsive();

  // 初始渲染
  navigateTo('dashboard');
});

// 点击模态框外部关闭
$('modalOverlay').addEventListener('click', e => { if(e.target === $('modalOverlay')) closeModal(); });
$('confirmOverlay').addEventListener('click', e => { if(e.target === $('confirmOverlay')) closeConfirm(); });

// PWA Service Worker 注册
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
