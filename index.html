<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>小七库存</title>
<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="小七库存">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon.svg">
<style>
/* ========== 全局变量与重置 ========== */
:root {
  --primary: #2563eb;
  --primary-light: #3b82f6;
  --primary-dark: #1d4ed8;
  --success: #16a34a;
  --success-light: #dcfce7;
  --warning: #d97706;
  --warning-light: #fef3c7;
  --danger: #dc2626;
  --danger-light: #fee2e2;
  --info: #0891b2;
  --info-light: #cffafe;
  --bg: #f1f5f9;
  --bg-white: #ffffff;
  --text: #1e293b;
  --text-secondary: #64748b;
  --text-light: #94a3b8;
  --border: #e2e8f0;
  --border-light: #f1f5f9;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 15px rgba(0,0,0,.1), 0 4px 6px rgba(0,0,0,.05);
  --radius: 8px;
  --radius-lg: 12px;
  --sidebar-width: 240px;
  --header-height: 60px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; }
a { text-decoration: none; color: var(--primary); }
button { cursor: pointer; font-family: inherit; }
input, select, textarea { font-family: inherit; font-size: 14px; }
table { border-collapse: collapse; width: 100%; }

/* ========== 布局 ========== */
.app { display: flex; min-height: 100vh; }
.sidebar { width: var(--sidebar-width); background: linear-gradient(180deg, #1e3a5f 0%, #0f2440 100%); color: #fff; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; display: flex; flex-direction: column; transition: transform .3s; }
.sidebar-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,.1); }
.sidebar-header h1 { font-size: 16px; font-weight: 700; color: #fff; }
.sidebar-header .subtitle { font-size: 11px; color: rgba(255,255,255,.5); margin-top: 2px; }
.sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
.nav-item { display: flex; align-items: center; padding: 10px 20px; color: rgba(255,255,255,.65); cursor: pointer; transition: all .2s; border-left: 3px solid transparent; font-size: 13px; }
.nav-item:hover { background: rgba(255,255,255,.08); color: #fff; }
.nav-item.active { background: rgba(255,255,255,.12); color: #fff; border-left-color: var(--primary-light); }
.nav-item .icon { width: 20px; margin-right: 10px; text-align: center; font-size: 15px; }
.nav-divider { height: 1px; background: rgba(255,255,255,.08); margin: 8px 16px; }

.main { flex: 1; margin-left: var(--sidebar-width); display: flex; flex-direction: column; }
.header { height: var(--header-height); background: var(--bg-white); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; position: sticky; top: 0; z-index: 50; }
.header-left { display: flex; align-items: center; gap: 16px; }
.header-left h2 { font-size: 18px; font-weight: 600; }
.breadcrumb { font-size: 12px; color: var(--text-secondary); }
.header-right { display: flex; align-items: center; gap: 12px; }
.header-right .date { font-size: 12px; color: var(--text-secondary); }
.content { flex: 1; padding: 24px; }

/* ========== 通用组件 ========== */
.card { background: var(--bg-white); border-radius: var(--radius-lg); box-shadow: var(--shadow); padding: 20px; margin-bottom: 20px; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border-light); }
.card-header h3 { font-size: 15px; font-weight: 600; }

.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 500; border: none; transition: all .2s; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { background: #15803d; }
.btn-warning { background: var(--warning); color: #fff; }
.btn-warning:hover { background: #b45309; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #b91c1c; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { background: var(--bg); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
.badge-success { background: var(--success-light); color: var(--success); }
.badge-warning { background: var(--warning-light); color: var(--warning); }
.badge-danger { background: var(--danger-light); color: var(--danger); }
.badge-info { background: var(--info-light); color: var(--info); }
.badge-default { background: var(--bg); color: var(--text-secondary); }

/* ========== 表格 ========== */
.table-wrapper { overflow-x: auto; }
table th { background: var(--bg); color: var(--text-secondary); font-weight: 600; font-size: 12px; text-transform: uppercase; padding: 10px 12px; text-align: left; white-space: nowrap; border-bottom: 2px solid var(--border); }
table td { padding: 10px 12px; border-bottom: 1px solid var(--border-light); vertical-align: middle; }
table tbody tr:hover { background: #f8fafc; }
.table-actions { display: flex; gap: 4px; }

/* ========== 表单 ========== */
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
.form-group label .required { color: var(--danger); }
.form-control { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-white); color: var(--text); transition: border-color .2s; }
.form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
select.form-control { appearance: auto; }
textarea.form-control { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
.form-inline { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

/* ========== 模态框 ========== */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.5); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: all .3s; }
.modal-overlay.show { opacity: 1; visibility: visible; }
.modal { background: var(--bg-white); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); width: 90%; max-width: 680px; max-height: 85vh; display: flex; flex-direction: column; transform: translateY(-20px); transition: transform .3s; }
.modal-overlay.show .modal { transform: translateY(0); }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
.modal-header h3 { font-size: 16px; font-weight: 600; }
.modal-close { width: 32px; height: 32px; border-radius: 50%; border: none; background: transparent; font-size: 18px; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; }
.modal-close:hover { background: var(--bg); }
.modal-body { padding: 20px; overflow-y: auto; flex: 1; }
.modal-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

/* ========== 统计卡片 ========== */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: var(--bg-white); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 16px; }
.stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
.stat-icon.blue { background: #dbeafe; color: var(--primary); }
.stat-icon.green { background: #dcfce7; color: var(--success); }
.stat-icon.orange { background: #fed7aa; color: var(--warning); }
.stat-icon.red { background: #fee2e2; color: var(--danger); }
.stat-icon.cyan { background: #cffafe; color: var(--info); }
.stat-info h4 { font-size: 24px; font-weight: 700; color: var(--text); }
.stat-info p { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.stat-info .trend { font-size: 11px; margin-top: 4px; }
.stat-info .trend.up { color: var(--success); }
.stat-info .trend.down { color: var(--danger); }

/* ========== 搜索筛选 ========== */
.toolbar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
.search-box { display: flex; align-items: center; background: var(--bg-white); border: 1px solid var(--border); border-radius: var(--radius); padding: 0 12px; }
.search-box input { border: none; background: transparent; padding: 8px; width: 200px; }
.search-box input:focus { outline: none; }
.search-box .search-icon { color: var(--text-light); }

/* ========== 标签页 ========== */
.tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 16px; gap: 0; }
.tab { padding: 10px 20px; color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; font-size: 13px; font-weight: 500; transition: all .2s; }
.tab:hover { color: var(--primary); }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }

/* ========== 空状态 ========== */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* ========== Toast 提示 ========== */
.toast-container { position: fixed; top: 20px; right: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 12px 20px; border-radius: var(--radius); color: #fff; font-size: 13px; box-shadow: var(--shadow-md); animation: slideIn .3s; display: flex; align-items: center; gap: 8px; }
.toast-success { background: var(--success); }
.toast-error { background: var(--danger); }
.toast-warning { background: var(--warning); }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ========== 确认对话框 ========== */
.confirm-content { text-align: center; padding: 20px 0; }
.confirm-content .icon { font-size: 48px; margin-bottom: 12px; }
.confirm-content p { font-size: 15px; color: var(--text); }
.confirm-content .sub { font-size: 13px; color: var(--text-secondary); margin-top: 8px; }

/* ========== 财务报表专用 ========== */
.report-period { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.chart-container { background: var(--bg-white); border-radius: var(--radius-lg); box-shadow: var(--shadow); padding: 20px; margin-bottom: 20px; }
.financial-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; margin-bottom: 20px; }
.financial-item { padding: 16px; background: var(--bg); border-radius: var(--radius); }
.financial-item .label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
.financial-item .value { font-size: 22px; font-weight: 700; }
.financial-item .value.positive { color: var(--success); }
.financial-item .value.negative { color: var(--danger); }
.invoice-card { border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
.invoice-card .inv-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.invoice-card .inv-title { font-weight: 600; }
.invoice-card .inv-meta { font-size: 12px; color: var(--text-secondary); }

/* ========== 响应式 ========== */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .form-row { grid-template-columns: 1fr; }
  .modal { width: 95%; margin: 8px; max-height: 85vh; }
  .header { padding: 0 12px; }
  .header h2 { font-size: 16px; }
  .content { padding: 12px; padding-bottom: 72px; }
  .card { padding: 12px; margin-bottom: 12px; }
  .table-actions { flex-direction: column; }
  .btn-sm { padding: 8px 12px; font-size: 13px; }
  .toolbar { flex-wrap: wrap; gap: 6px; padding: 8px; }
  .toolbar input, .toolbar select { font-size: 14px; }
  .search-box { width: 100%; }
  .search-box input { width: 100%; }

  /* 底部导航栏 */
  .mobile-nav { display: flex; }
  .main { padding-bottom: 60px; }
  .content { padding-bottom: 80px; }
}

@media (min-width: 769px) {
  .mobile-nav { display: none; }
}

/* ========== 打印 ========== */
@media print {
  .sidebar, .header, .btn, .toolbar { display: none !important; }
  .main { margin-left: 0; }
  .content { padding: 0; }
  .card { box-shadow: none; border: 1px solid #ddd; }
}

/* ========== 水印条 ========== */
.waterfall-bar { display: flex; align-items: flex-end; gap: 4px; height: 180px; padding: 0 4px; }
.waterfall-item { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; min-width: 30px; }
.waterfall-item .bar { width: 100%; border-radius: 3px 3px 0 0; min-height: 2px; transition: height .5s; }
.waterfall-item .bar-label { font-size: 10px; color: var(--text-secondary); margin-top: 4px; white-space: nowrap; }
.waterfall-item .bar-value { font-size: 10px; font-weight: 600; margin-bottom: 2px; }

/* 进度条 */
.progress-bar { height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 4px; transition: width .5s; }

/* ========== 移动端底部导航 ========== */
.mobile-nav {
  position: fixed; bottom: 0; left: 0; right: 0; height: 60px;
  background: var(--bg-white); border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-around;
  z-index: 200; padding-bottom: env(safe-area-inset-bottom);
  box-shadow: 0 -2px 10px rgba(0,0,0,.06);
}
.mobile-nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 4px 0; flex: 1; cursor: pointer; transition: all .2s;
  color: var(--text-secondary); font-size: 10px; -webkit-tap-highlight-color: transparent;
}
.mobile-nav-item .nav-icon { font-size: 20px; line-height: 1; }
.mobile-nav-item.active { color: var(--primary); }
.mobile-nav-item:active { opacity: .7; }
.mobile-nav-more {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 4px 0; cursor: pointer; color: var(--text-secondary); font-size: 10px;
  -webkit-tap-highlight-color: transparent; position: relative;
}
.mobile-nav-more .nav-icon { font-size: 20px; line-height: 1; }
.mobile-nav-panel {
  position: fixed; bottom: 60px; left: 0; right: 0;
  background: var(--bg-white); border-top: 1px solid var(--border);
  border-radius: 16px 16px 0 0; box-shadow: 0 -4px 20px rgba(0,0,0,.1);
  padding: 16px; z-index: 201; display: none;
  animation: slideUp .25s ease;
}
.mobile-nav-panel.show { display: block; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.mobile-nav-panel-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 12px; }
.mobile-nav-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.mobile-nav-grid-item {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 12px 4px; border-radius: 12px; cursor: pointer; transition: all .15s;
  -webkit-tap-highlight-color: transparent;
}
.mobile-nav-grid-item:active { background: var(--bg); }
.mobile-nav-grid-item .nav-icon { font-size: 24px; }
.mobile-nav-grid-item .nav-label { font-size: 11px; color: var(--text); text-align: center; }
.mobile-nav-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.3); z-index: 200; display: none;
}
.mobile-nav-overlay.show { display: block; }
</style>
</head>
<body>

<div class="app">
  <!-- 侧边栏 -->

      <div class="subtitle">烟台乐姆</div>

<nav class="mobile-nav" id="mobileNav">

<!-- 模态框容器 -->

      <h3 id="modalTitle">标题</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<!-- 确认框 -->
<div class="modal-overlay" id="confirmOverlay">
  <div class="modal" style="max-width:420px;">
    <div class="modal-body">
      <div class="confirm-content">
        <div class="icon" id="confirmIcon">⚠️</div>
        <p id="confirmText">确认操作？</p>
        <p class="sub" id="confirmSub"></p>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeConfirm()">取消</button>
      <button class="btn btn-danger" id="confirmBtn" onclick="confirmAction()">确认</button>
    </div>
  </div>
</div>

<!-- Toast容器 -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ========== 工具函数 ==========
const $ = id => document.getElementById(id);
const qs = sel => document.querySelector(sel);
const qsa = sel => document.querySelectorAll(sel);
const genId = () => Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
const fmtMoney = n => '¥' + Number(n||0).toLocaleString('zh-CN', {minimumFractionDigits:2, maximumFractionDigits:2});
const fmtDate = d => d ? new Date(d).toLocaleDateString('zh-CN') : '-';
const fmtDateTime = d => d ? new Date(d).toLocaleString('zh-CN') : '-';
const today = () => new Date().toISOString().slice(0,10);

// 日期快捷选择：type='month'当月 / 'year'今年
function setDateRange(fromId, toId, type, cb) {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  let from, to;
  if(type === 'month') {
    from = `${y}-${m}-01`;
    const lastDay = new Date(y, now.getMonth()+1, 0).getDate();
    to = `${y}-${m}-${String(lastDay).padStart(2,'0')}`;
  } else {
    from = `${y}-01-01`;
    to = `${y}-12-31`;
  }
  const elFrom = $(fromId); if(elFrom) elFrom.value = from;
  const elTo = $(toId); if(elTo) elTo.value = to;
  if(cb) cb();
}

// ========== Toast ==========
function toast(msg, type='success') {
  const t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.textContent = msg;
  $('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ========== 模态框 ==========
let _confirmCb = null;
function openModal(title, bodyHtml, footerHtml) {
  $('modalTitle').textContent = title;
  $('modalBody').innerHTML = bodyHtml;
  $('modalFooter').innerHTML = footerHtml || '';
  $('modalOverlay').classList.add('show');
}
function closeModal() { $('modalOverlay').classList.remove('show'); }

function showConfirm(text, sub, callback, icon='⚠️') {
  $('confirmText').textContent = text;
  $('confirmSub').textContent = sub || '';
  $('confirmIcon').textContent = icon;
  _confirmCb = callback;
  $('confirmOverlay').classList.add('show');
}
function closeConfirm() { $('confirmOverlay').classList.remove('show'); _confirmCb = null; }
function confirmAction() { if(_confirmCb) _confirmCb(); closeConfirm(); }

// ========== 数据库 (LocalStorage) ==========
const DB = {
  _cache: {},
  get(key, def=[]) {
    if(!this._cache[key]) {
      try { this._cache[key] = JSON.parse(localStorage.getItem('erm_'+key)) || def; }
      catch { this._cache[key] = def; }
    }
    return this._cache[key];
  },
  set(key, data) { this._cache[key] = data; localStorage.setItem('erm_'+key, JSON.stringify(data)); },
  add(key, item) { const d = this.get(key); item.id = item.id || genId(); item.createdAt = item.createdAt || new Date().toISOString(); d.push(item); this.set(key, d); return item; },
  update(key, id, updates) { const d = this.get(key); const i = d.findIndex(x => x.id === id); if(i>-1) { Object.assign(d[i], updates, {updatedAt: new Date().toISOString()}); this.set(key, d); return d[i]; } return null; },
  remove(key, id) { const d = this.get(key).filter(x => x.id !== id); this.set(key, d); },
  find(key, id) { return this.get(key).find(x => x.id === id); },
  clear(key) { this.set(key, []); this._cache[key] = []; },
  exportAll() {
    const keys = ['products','purchases','sales','outsource','production','invoices',
                  'stock','stockFlow','warehouses','categories','units','paymentMethods',
                  'suppliers','customers','partners'];
    const data = {};
    keys.forEach(k => { data[k] = this.get(k); });
    return JSON.stringify(data, null, 2);
  },
  importAll(jsonStr) {
    const data = JSON.parse(jsonStr);
    Object.keys(data).forEach(k => { this.set(k, data[k]); });
  },
  getStats() {
    const keys = ['products','purchases','sales','outsource','production','invoices',
                  'stock','stockFlow','warehouses','categories','units','paymentMethods',
                  'suppliers','customers','partners'];
    const stats = {};
    keys.forEach(k => {
      const d = this.get(k);
      stats[k] = { count: Array.isArray(d) ? d.length : 0, size: JSON.stringify(d).length };
    });
    return stats;
  }
};

// ========== 初始化默认数据 ==========
function initDefaults() {
  if(DB.get('warehouses').length === 0) {
    DB.set('warehouses', [
      { id: genId(), name: '原料仓库', type: 'material', createdAt: new Date().toISOString(), description: '存放原材料' },
      { id: genId(), name: '成品仓库', type: 'product', createdAt: new Date().toISOString(), description: '存放成品' },
      { id: genId(), name: '半成品仓库', type: 'semi', createdAt: new Date().toISOString(), description: '存放半成品' }
    ]);
  }
  if(DB.get('categories').length === 0) {
    DB.set('categories', ['原材料','半成品','成品','辅料','包装材料','工具配件']);
  }
  if(DB.get('units').length === 0) {
    DB.set('units', ['个','件','kg','吨','米','箱','套','批','卷','片','块','根','只','台']);
  }
  if(DB.get('paymentMethods').length === 0) {
    DB.set('paymentMethods', ['银行转账','现金','承兑汇票','支票','微信/支付宝']);
  }
}

// ========== 页面路由 ==========
let currentPage = 'dashboard';
const pageTitles = {
  dashboard: '数据看板', products: '产品管理', purchase: '采购管理',
  production: '生产管理', sales: '销售管理', outsource: '外协加工',
  warehouse: '库房管理', finance: '财务报表', invoice: '开票管理', settings: '数据管理'
};

function navigateTo(page) {
  currentPage = page;
  $('pageTitle').textContent = pageTitles[page] || '';
  qsa('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.page === page));
  renderPage(page);
}

function renderPage(page) {
  const el = $('mainContent');
  const renderers = {
    dashboard: renderDashboard,
    products: renderProducts,
    purchase: renderPurchase,
    production: renderProduction,
    sales: renderSales,
    outsource: renderOutsource,
    warehouse: renderWarehouse,
    finance: renderFinance,
    invoice: renderInvoice,
    settings: renderSettings
  };
  if(renderers[page]) renderers[page](el);
}

// ========== 侧边栏 ==========
function toggleSidebar() { $('sidebar').classList.toggle('open'); }

// ========== 移动端底部导航 ==========
window.mobileNavTo = function(el, page) {
  qsa('.mobile-nav-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  navigateTo(page);
};

window.toggleMobileNavPanel = function() {
  const panel = $('mobileNavPanel');
  const overlay = $('mobileNavOverlay');
  if (panel.classList.contains('show')) {
    closeMobileNavPanel();
  } else {
    panel.classList.add('show');
    overlay.classList.add('show');
  }
};

window.closeMobileNavPanel = function() {
  $('mobileNavPanel').classList.remove('show');
  $('mobileNavOverlay').classList.remove('show');
};

// 更新navigateTo同步底部导航高亮
const _origNavigateTo = navigateTo;
navigateTo = function(page) {
  _origNavigateTo(page);
  // 同步底部导航高亮
  qsa('.mobile-nav-item').forEach(i => {
    i.classList.toggle('active', i.dataset.page === page);
  });
};

// ========== 数据看板 ==========
function renderDashboard(el) {
  const products = DB.get('products');
  const purchases = DB.get('purchases');
  const sales = DB.get('sales');
  const outsource = DB.get('outsource');
  const warehouses = DB.get('warehouses');
  const stock = DB.get('stock');
  const production = DB.get('production');

  // 统计
  const totalProducts = products.length;
  const totalStock = stock.reduce((s,i) => s + (i.quantity||0), 0);
  const monthStart = new Date(); monthStart.setDate(1); monthStart.setHours(0,0,0,0);
  const monthSales = sales.filter(s => new Date(s.createdAt) >= monthStart);
  const monthSalesAmount = monthSales.reduce((s,o) => s + (Number(o.totalAmount)||0), 0);
  const monthPurchaseAmount = purchases.filter(p => new Date(p.createdAt) >= monthStart).reduce((s,o) => s + (Number(o.totalAmount)||0), 0);
  const monthOutsourceAmount = outsource.filter(o => new Date(o.createdAt) >= monthStart).reduce((s,o) => s + (Number(o.totalAmount)||0), 0);
  const totalCost = monthPurchaseAmount + monthOutsourceAmount;
  // 更精确：用销售实际出库成本计算
  const monthSalesForCost = monthSales.map(so => {
    let costOfGoods = 0;
    so.items.forEach(item => {
      const stockItem = DB.get('stock').find(s => s.productId === item.productId);
      costOfGoods += (item.qty * (stockItem ? stockItem.unitCost : item.price));
    });
    return costOfGoods;
  });
  const actualCostOfGoods = monthSalesForCost.reduce((s,v) => s + v, 0);
  const grossProfit = monthSalesAmount - actualCostOfGoods;
  const grossProfitRate = monthSalesAmount > 0 ? (grossProfit / monthSalesAmount * 100).toFixed(1) : 0;

  // 收款统计
  const allPaid = sales.reduce((s,o) => s + (o.payments||[]).reduce((ps,p) => ps + (Number(p.amount)||0), 0), 0);
  const allUnpaid = sales.reduce((s,o) => s + (Number(o.totalAmount)||0) - (o.payments||[]).reduce((ps,p) => ps + (Number(p.amount)||0), 0), 0);

  // 待处理事项
  const pendingPurchase = purchases.filter(p => p.status === 'pending').length;
  const pendingProduction = production.filter(p => p.status === 'pending' || p.status === 'producing').length;
  const pendingSales = sales.filter(s => s.status === 'pending' || s.status === 'approved').length;
  const lowStock = stock.filter(s => (s.quantity||0) <= (s.warningLevel||10)).length;

  // 最近销售
  const recentSales = [...sales].sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0, 5);
  // 最近采购
  const recentPurchase = [...purchases].sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0, 5);

  el.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon blue">📦</div>
        <div class="stat-info">
          <h4>${totalProducts}</h4>
          <p>产品/物料总数</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">💰</div>
        <div class="stat-info">
          <h4>${fmtMoney(monthSalesAmount)}</h4>
          <p>本月销售额</p>
          <div class="trend up">月度汇总</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon orange">📊</div>
        <div class="stat-info">
          <h4>${fmtMoney(grossProfit)}</h4>
          <p>本月毛利润</p>
          <div class="trend ${grossProfit >= 0 ? 'up' : 'down'}">毛利率 ${grossProfitRate}%</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon cyan">🏢</div>
        <div class="stat-info">
          <h4>${warehouses.length}</h4>
          <p>库房数量</p>
        </div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon blue">🛒</div>
        <div class="stat-info">
          <h4>${fmtMoney(monthPurchaseAmount)}</h4>
          <p>本月采购额</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon red">🤝</div>
        <div class="stat-info">
          <h4>${fmtMoney(monthOutsourceAmount)}</h4>
          <p>本月外协费用</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon orange">⚠️</div>
        <div class="stat-info">
          <h4>${pendingPurchase + pendingProduction + pendingSales}</h4>
          <p>待处理事项</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon red">🔔</div>
        <div class="stat-info">
          <h4>${lowStock}</h4>
          <p>库存预警</p>
        </div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon green">💵</div>
        <div class="stat-info">
          <h4>${fmtMoney(monthSalesAmount > 0 ? monthSales.filter(s => s.payments && s.payments.length).reduce((s,o) => s + o.payments.reduce((ps,p) => ps + (Number(p.amount)||0), 0), 0) : 0)}</h4>
          <p>本月已收款</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon orange">📊</div>
        <div class="stat-info">
          <h4>${fmtMoney(sales.reduce((s,o) => s + (Number(o.totalAmount)||0) - (o.payments||[]).reduce((ps,p) => ps + (Number(p.amount)||0), 0), 0))}</h4>
          <p>累计未收款</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon cyan">💰</div>
        <div class="stat-info">
          <h4>${fmtMoney(allPaid)}</h4>
          <p>累计已收款</p>
        </div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
      <div class="card">
        <div class="card-header">
          <h3>📋 待处理事项</h3>
        </div>
        <table>
          <thead><tr><th>类型</th><th>待处理</th><th>操作</th></tr></thead>
          <tbody>
            <tr><td><span class="badge badge-info">采购</span></td><td>${pendingPurchase} 笔待审批</td><td><button class="btn btn-sm btn-outline" onclick="navigateTo('purchase')">查看</button></td></tr>
            <tr><td><span class="badge badge-warning">生产</span></td><td>${pendingProduction} 笔进行中</td><td><button class="btn btn-sm btn-outline" onclick="navigateTo('production')">查看</button></td></tr>
            <tr><td><span class="badge badge-success">销售</span></td><td>${pendingSales} 笔待发货</td><td><button class="btn btn-sm btn-outline" onclick="navigateTo('sales')">查看</button></td></tr>
            <tr><td><span class="badge badge-danger">库存</span></td><td>${lowStock} 项低于预警</td><td><button class="btn btn-sm btn-outline" onclick="navigateTo('warehouse')">查看</button></td></tr>
          </tbody>
        </table>
      </div>
      <div class="card">
        <div class="card-header">
          <h3>💰 本月利润概览</h3>
        </div>
        <div style="padding:10px 0;">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
            <span>销售收入</span><span style="font-weight:600;color:var(--success);">${fmtMoney(monthSalesAmount)}</span>
          </div>
          <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
            <span>销售成本(按库存)</span><span style="color:var(--danger);">-${fmtMoney(actualCostOfGoods)}</span>
          </div>
          <hr style="border:none;border-top:1px dashed var(--border);margin:10px 0;">
          <div style="display:flex;justify-content:space-between;font-size:16px;font-weight:700;">
            <span>毛利润</span><span style="color:${grossProfit>=0?'var(--success)':'var(--danger)'};">${fmtMoney(grossProfit)}</span>
          </div>
          <div style="display:flex;justify-content:space-between;margin-top:4px;color:var(--text-secondary);font-size:12px;">
            <span>毛利率</span><span>${grossProfitRate}%</span>
          </div>
          <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border-light);font-size:11px;color:var(--text-light);">
            (采购+外协: ${fmtMoney(totalCost)} | 实际库存成本: ${fmtMoney(actualCostOfGoods)})
          </div>
        </div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
      <div class="card">
        <div class="card-header"><h3>🛒 最近采购</h3></div>
        ${recentPurchase.length ? `
        <div class="table-wrapper">
          <table>
            <thead><tr><th>单号</th><th>供应商</th><th>金额</th><th>状态</th></tr></thead>
            <tbody>${recentPurchase.map(p => `<tr>
              <td>${p.orderNo||'-'}</td><td>${p.supplier||'-'}</td>
              <td>${fmtMoney(p.totalAmount)}</td>
              <td>${statusBadge(p.status)}</td>
            </tr>`).join('')}</tbody>
          </table>
        </div>` : '<div class="empty-state"><p>暂无采购记录</p></div>'}
      </div>
      <div class="card">
        <div class="card-header"><h3>💰 最近销售</h3></div>
        ${recentSales.length ? `
        <div class="table-wrapper">
          <table>
            <thead><tr><th>单号</th><th>客户</th><th>金额</th><th>状态</th></tr></thead>
            <tbody>${recentSales.map(s => `<tr>
              <td>${s.orderNo||'-'}</td><td>${s.customer||'-'}</td>
              <td>${fmtMoney(s.totalAmount)}</td>
              <td>${statusBadge(s.status)}</td>
            </tr>`).join('')}</tbody>
          </table>
        </div>` : '<div class="empty-state"><p>暂无销售记录</p></div>'}
      </div>
    </div>
  `;
}

function statusBadge(status) {
  const map = {
    pending: ['待处理','default'], approved: ['已审批','info'], rejected: ['已拒绝','danger'],
    partial: ['部分入库','warning'], completed: ['已完成','success'], producing: ['生产中','warning'],
    shipped: ['已发货','info'], invoiced: ['已开票','success'], cancelled: ['已取消','danger'],
    paid_full: ['已结清','success']
  };
  const [text, cls] = map[status] || [status||'未知','default'];
  return `<span class="badge badge-${cls}">${text}</span>`;
}

// ========== 产品管理 ==========
function renderProducts(el) {
  const products = DB.get('products');
  const categories = DB.get('categories');
  const units = DB.get('units');
  let filter = { keyword: '', category: '' };

  function render() {
    let list = [...products];
    if(filter.keyword) list = list.filter(p => (p.name+p.code+p.spec).toLowerCase().includes(filter.keyword.toLowerCase()));
    if(filter.category) list = list.filter(p => p.category === filter.category);

    el.innerHTML = `
      <div class="toolbar">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="prodSearch" placeholder="搜索产品名称/编码..." value="${filter.keyword}">
        </div>
        <select class="form-control" style="width:150px;" id="prodCatFilter">
          <option value="">全部分类</option>
          ${categories.map(c => `<option value="${c}" ${filter.category===c?'selected':''}>${c}</option>`).join('')}
        </select>
        <button class="btn btn-primary" onclick="openProductForm()">+ 新增产品</button>
      </div>
      <div class="card" style="padding:0;">
        <div class="table-wrapper">
          <table>
            <thead><tr><th>编码</th><th>名称</th><th>规格</th><th>分类</th><th>单位</th><th>单件重(kg)</th><th>参考价</th><th>备注</th><th>操作</th></tr></thead>
            <tbody>
              ${list.length ? list.map(p => `<tr>
                <td>${p.code||'-'}</td><td><strong>${p.name}</strong></td>
                <td>${p.spec||'-'}</td><td><span class="badge badge-info">${p.category||'-'}</span></td>
                <td>${p.unit||'-'}</td><td>${p.weight ? p.weight+' kg' : '-'}</td><td>${fmtMoney(p.price)}</td>
                <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.remark||''}</td>
                <td class="table-actions">
                  <button class="btn btn-sm btn-outline" onclick="openProductForm('${p.id}')">编辑</button>
                  <button class="btn btn-sm btn-danger" onclick="deleteProduct('${p.id}')">删除</button>
                </td>
              </tr>`).join('') : `<tr><td colspan="9"><div class="empty-state"><p>暂无产品数据，点击"新增产品"开始添加</p></div></td></tr>`}
            </tbody>
          </table>
        </div>
      </div>
    `;

    $('prodSearch').addEventListener('input', e => { filter.keyword = e.target.value; render(); });
    $('prodCatFilter').addEventListener('change', e => { filter.category = e.target.value; render(); });
  }
  render();

  window.openProductForm = function(id) {
    const p = id ? DB.find('products', id) : {};
    const title = id ? '编辑产品' : '新增产品';
    openModal(title, `
      <div class="form-row">
        <div class="form-group"><label>产品编码</label><input class="form-control" id="pCode" value="${p.code||''}"></div>
        <div class="form-group"><label>产品名称 <span class="required">*</span></label><input class="form-control" id="pName" value="${p.name||''}"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>规格型号</label><input class="form-control" id="pSpec" value="${p.spec||''}"></div>
        <div class="form-group"><label>分类 <span class="required">*</span></label>
          <select class="form-control" id="pCategory">
            <option value="">请选择</option>
            ${categories.map(c => `<option value="${c}" ${p.category===c?'selected':''}>${c}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>单位 <span class="required">*</span></label>
          <select class="form-control" id="pUnit">
            <option value="">请选择</option>
            ${units.map(u => `<option value="${u}" ${p.unit===u?'selected':''}>${u}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label>参考单价</label><input class="form-control" id="pPrice" type="number" step="0.01" value="${p.price||''}"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>单件重量(kg)</label><input class="form-control" id="pWeight" type="number" step="0.001" min="0" value="${p.weight||''}" placeholder="用于按重量采购计价"></div>
      </div>
      <div class="form-group"><label>备注</label><textarea class="form-control" id="pRemark" rows="2">${p.remark||''}</textarea></div>
    `, `<button class="btn btn-outline" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="saveProduct('${id||''}')">保存</button>`);
  };

  window.saveProduct = function(id) {
    const data = {
      code: $('pCode').value.trim(),
      name: $('pName').value.trim(),
      spec: $('pSpec').value.trim(),
      category: $('pCategory').value,
      unit: $('pUnit').value,
      price: Number($('pPrice').value) || 0,
      weight: Number($('pWeight').value) || 0,
      remark: $('pRemark').value.trim()
    };
    if(!data.name) return toast('请输入产品名称','error');
    if(!data.category) return toast('请选择分类','error');
    if(!data.unit) return toast('请选择单位','error');
    if(id) { DB.update('products', id, data); toast('产品已更新'); }
    else { DB.add('products', data); toast('产品已添加'); }
    closeModal(); render();
  };

  window.deleteProduct = function(id) {
    const p = DB.find('products', id);
    showConfirm('删除产品', `确定要删除「${p.name}」吗？此操作不可恢复。`, () => {
      DB.remove('products', id); toast('已删除'); render();
    }, '🗑️');
  };
}

// ========== 采购管理 ==========
function renderPurchase(el) {
  const purchases = DB.get('purchases');
  const suppliers = DB.get('suppliers');

  function render() {
    let list = [...purchases].sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
    el.innerHTML = `
      <div class="toolbar" style="flex-wrap:wrap;gap:8px;">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="purSearch" placeholder="搜索单号/供应商..." oninput="filterPurchase()">
        </div>
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
          <label style="font-size:13px;color:var(--text-secondary);white-space:nowrap;">日期</label>
          <input type="date" id="purDateFrom" class="form-control" style="width:140px;height:34px;padding:4px 8px;" onchange="filterPurchase()">
          <span style="color:var(--text-secondary);">~</span>
          <input type="date" id="purDateTo" class="form-control" style="width:140px;height:34px;padding:4px 8px;" onchange="filterPurchase()">
          <button class="btn btn-sm btn-outline" onclick="setDateRange('purDateFrom','purDateTo','month',filterPurchase)">当月</button>
          <button class="btn btn-sm btn-outline" onclick="setDateRange('purDateFrom','purDateTo','year',filterPurchase)">今年</button>
          <button class="btn btn-sm btn-outline" onclick="resetPurFilter()">重置</button>
        </div>
        <div style="margin-left:auto;display:flex;gap:8px;">
          <button class="btn btn-outline" onclick="openSupplierForm()">+ 管理供应商</button>
          <button class="btn btn-primary" onclick="openPurchaseForm()">+ 新增采购单</button>
        </div>
      </div>
      <div class="card" style="padding:0;">
        <div class="table-wrapper">
          <table>
            <thead><tr><th>采购单号</th><th>供应商</th><th>采购日期</th><th>金额</th><th>数量/总重</th><th>单价</th><th>状态</th><th>操作</th></tr></thead>
            <tbody id="purchaseTableBody">
              ${list.length ? list.map(p => purchaseRow(p)).join('') : `<tr><td colspan="8"><div class="empty-state"><p>暂无采购记录</p></div></td></tr>`}
            </tbody>
          </table>
        </div>
      </div>
    `;
  }

  function purchaseRow(p) {
    const received = (p.items||[]).reduce((s,i) => s + (i.inboundQty||0), 0);
    const isWeight = p.priceMode === 'weight';
    const tw = isWeight ? (p.items||[]).reduce((s,i) => s + (i.totalWeight||0), 0) : 0;
    // 公斤模式：按每个产品分别核算单价（小计/数量），多产品用逗号分隔
    let priceInfo;
    if (isWeight) {
      const items = p.items || [];
      if (items.length === 0) {
        priceInfo = '-';
      } else if (items.length === 1) {
        const it = items[0];
        const q = it.qty || 0;
        priceInfo = q > 0 ? (it.subtotal / q).toFixed(2) + ' 元/件' : '-';
      } else {
        priceInfo = items.map(it => {
          const q = it.qty || 0;
          const unitP = q > 0 ? (it.subtotal / q).toFixed(2) : '-';
          return (it.productName || '') + ' ' + unitP;
        }).join('，');
      }
    } else {
      priceInfo = (p.items||[]).map(i => (i.productName||'') + ' ' + fmtMoney(i.price)).join('，') || '-';
    }
    return `<tr>
      <td><strong>${p.orderNo}</strong></td><td>${p.supplier}</td>
      <td>${fmtDate(p.orderDate)}</td><td>${fmtMoney(p.totalAmount)}</td>
      <td>${isWeight ? (tw > 0 ? tw.toFixed(3) + ' kg' : '-') : (p.totalQty||'-')}</td>
      <td style="font-size:12px;max-width:200px;">${priceInfo}</td>
      <td>${statusBadge(p.status)}</td>
      <td class="table-actions">
        <button class="btn btn-sm btn-outline" onclick="viewPurchase('${p.id}')">详情</button>
        ${p.status==='pending'?`<button class="btn btn-sm btn-outline" onclick="openPurchaseForm('${p.id}')">编辑</button>`:''}
        ${p.status==='pending'?`<button class="btn btn-sm btn-success" onclick="approvePurchase('${p.id}')">审批</button>`:''}
        ${p.status==='approved'?`<button class="btn btn-sm btn-warning" onclick="openPurchaseInbound('${p.id}')">入库</button>`:''}
        ${p.status==='partial'?`<button class="btn btn-sm btn-warning" onclick="openPurchaseInbound('${p.id}')">继续入库</button>`:''}
        ${p.status==='pending'?`<button class="btn btn-sm btn-danger" onclick="deletePurchase('${p.id}')">删除</button>`:''}
        ${p.status==='approved'&&!received?`<button class="btn btn-sm btn-outline" onclick="rejectPurchase('${p.id}')" title="反审回退">↩ 反审</button>`:''}
        ${p.status==='partial'||p.status==='completed'?`<button class="btn btn-sm btn-outline" onclick="reversePurchase('${p.id}')" title="反审回退入库">↩ 反审入库</button>`:''}
      </td>
    </tr>`;
  }

  window.filterPurchase = function() {
    const kw = ($('purSearch') || {}).value || '';
    const from = ($('purDateFrom') || {}).value || '';
    const to = ($('purDateTo') || {}).value || '';
    const filtered = purchases.filter(p => {
      const matchKw = !kw || (p.orderNo + p.supplier).toLowerCase().includes(kw.toLowerCase());
      const d = (p.orderDate || '').slice(0, 10);
      const matchFrom = !from || d >= from;
      const matchTo   = !to   || d <= to;
      return matchKw && matchFrom && matchTo;
    });
    $('purchaseTableBody').innerHTML = filtered.length
      ? filtered.map(purchaseRow).join('')
      : '<tr><td colspan="8"><div class="empty-state"><p>无匹配结果</p></div></td></tr>';
  };

  window.resetPurFilter = function() {
    const s = $('purSearch'); if (s) s.value = '';
    const f = $('purDateFrom'); if (f) f.value = '';
    const t = $('purDateTo'); if (t) t.value = '';
    filterPurchase();
  };

  window.openPurchaseForm = function(editId) {
    const prods = DB.get('products');
    const sups = DB.get('suppliers');
    const po = editId ? DB.find('purchases', editId) : null;
    const orderNo = po ? po.orderNo : ('PO' + today().replace(/-/g,'').slice(2) + String(purchases.length+1).padStart(3,'0'));
    const selSup = (name) => sups.map(s => `<option value="${s.name}" ${s.name===name?'selected':''}>${s.name} ${s.contact?'('+s.contact+')':''}</option>`).join('');
    openModal(po ? '编辑采购单' : '新增采购单', `
      <div class="form-row">
        <div class="form-group"><label>采购单号</label><input class="form-control" id="poNo" value="${orderNo}"></div>
        <div class="form-group"><label>采购日期 <span class="required">*</span></label><input class="form-control" id="poDate" type="date" value="${po ? po.orderDate : today()}"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>供应商 <span class="required">*</span></label>
          <select class="form-control" id="poSupplier">
            <option value="">请选择供应商</option>
            ${selSup(po ? po.supplier : '')}
          </select>
        </div>
        <div class="form-group"><label>计价方式</label>
          <select class="form-control" id="poPriceMode" onchange="switchPOMode()">
            <option value="piece" ${(!po||po.priceMode!=='weight')?'selected':''}>单件计价（数量 × 单价）</option>
            <option value="weight" ${(po&&po.priceMode==='weight')?'selected':''}>公斤计价（元/kg）</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>采购明细</label>
        <table id="poItems">
          <thead id="poItemsHead"></thead>
          <tbody id="poItemsBody"></tbody>
        </table>
        <button class="btn btn-sm btn-outline" style="margin-top:8px;" onclick="addPOItem()">+ 添加行</button>
      </div>
      <div id="poSummary"></div>
    `, `<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="savePurchase('${editId||''}')">保存</button>`);

    // 初始化表头和合计区，然后填充行
    renderPOHead();
    renderPOSummary();
    if (po && po.items && po.items.length) {
      // 回填已有明细
      po.items.forEach(item => addPOItem(item));
      // 回填备注
      if ($('poRemark') && po.remark) $('poRemark').value = po.remark;
      calcPOTotal();
    } else {
      addPOItem();
    }
  };

  // 根据计价方式渲染表头
  function renderPOHead() {
    const mode = getPOMode();
    $('poItemsHead').innerHTML = mode === 'weight'
      ? '<tr><th>产品</th><th>库存</th><th>数量</th><th>总重(kg)</th><th>元/kg</th><th>小计(元)</th><th>单价(元/件)</th><th></th></tr>'
      : '<tr><th>产品</th><th>库存</th><th>数量</th><th>单价(元)</th><th>小计(元)</th><th></th></tr>';
  }

  // 渲染合计区域
  function renderPOSummary() {
    const mode = getPOMode();
    if (mode === 'weight') {
      $('poSummary').innerHTML = `
        <div class="form-row">
          <div class="form-group"><label>合计金额</label><input class="form-control" id="poTotal" value="¥0.00" readonly style="font-weight:700;font-size:16px;color:var(--danger);"></div>
          <div class="form-group"><label>总数量</label><input class="form-control" id="poTotalQty" value="0" readonly></div>
          <div class="form-group"><label>总重量(kg)</label><input class="form-control" id="poTotalWeight" value="0" readonly style="font-weight:600;"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>备注</label><input class="form-control" id="poRemark"></div>
        </div>`;
    } else {
      $('poSummary').innerHTML = `
        <div class="form-row">
          <div class="form-group"><label>合计金额</label><input class="form-control" id="poTotal" value="¥0.00" readonly style="font-weight:700;font-size:16px;color:var(--danger);"></div>
          <div class="form-group"><label>总数量</label><input class="form-control" id="poTotalQty" value="0" readonly></div>
          <div class="form-group"><label>备注</label><input class="form-control" id="poRemark"></div>
        </div>`;
    }
  }

  function getPOMode() {
    const el = $('poPriceMode');
    return el ? el.value : 'piece';
  }

  // 切换计价方式：重新渲染表头+所有行+合计
  window.switchPOMode = function() {
    renderPOHead();
    renderPOSummary();
    rebuildPORows();
    calcPOTotal();
  };

  // 保留已有产品选择和库存信息，按新模式重建行
  function rebuildPORows() {
    const rows = qsa('#poItemsBody tr');
    const prods = DB.get('products');
    const oldData = [];
    rows.forEach(row => {
      oldData.push({
        prodId: row.querySelector('.po-prod')?.value || '',
        qty: Number(row.querySelector('.po-qty')?.value) || 0,
        stockHtml: row.querySelector('.po-stock')?.innerHTML || '-'
      });
    });
    $('poItemsBody').innerHTML = '';
    const mode = getPOMode();
    oldData.forEach(d => {
      addPOItem();
      const lastRow = $('poItemsBody').lastElementChild;
      if (d.prodId) {
        lastRow.querySelector('.po-prod').value = d.prodId;
        lastRow.querySelector('.po-prod').dispatchEvent(new Event('change'));
      }
      if (d.qty) lastRow.querySelector('.po-qty').value = d.qty;
    });
    // 如果没有旧行，至少保留一行
    if (!oldData.length) addPOItem();
  }

  // 添加行，prefill 可选传入已有 item 数据（编辑回填）
  window.addPOItem = function(prefill) {
    const prods = DB.get('products');
    const mode = getPOMode();
    const row = document.createElement('tr');
    if (mode === 'weight') {
      row.innerHTML = `
        <td><select class="form-control po-prod">${prods.map(p => `<option value="${p.id}" data-price="${p.price}" data-weight="${p.weight||''}">${p.name} (${p.spec||''})</option>`).join('')}</select></td>
        <td class="po-stock" style="font-size:12px;">-</td>
        <td><input class="form-control po-qty" type="number" min="1" value="${prefill ? (prefill.qty||1) : 1}" oninput="calcPOItem(this)"></td>
        <td><input class="form-control po-total-weight" type="number" step="0.001" min="0" placeholder="填写总重" value="${prefill ? (prefill.totalWeight||'') : ''}" oninput="calcPOItem(this)"></td>
        <td><input class="form-control po-kg-price" type="number" step="0.01" placeholder="元/kg" value="${prefill ? (prefill.kgPrice||'') : ''}" oninput="calcPOItem(this)"></td>
        <td class="po-sub">¥0.00</td>
        <td class="po-unit-price" style="font-size:12px;color:var(--text-secondary);white-space:nowrap;">-</td>
        <td><button class="btn btn-sm btn-danger" onclick="this.closest('tr').remove();calcPOTotal()">×</button>`;
    } else {
      row.innerHTML = `
        <td><select class="form-control po-prod">${prods.map(p => `<option value="${p.id}" data-price="${p.price}" data-weight="${p.weight||''}">${p.name} (${p.spec||''})</option>`).join('')}</select></td>
        <td class="po-stock" style="font-size:12px;">-</td>
        <td><input class="form-control po-qty" type="number" min="1" value="${prefill ? (prefill.qty||1) : 1}" oninput="calcPOItem(this)"></td>
        <td><input class="form-control po-price" type="number" step="0.01" value="${prefill ? (prefill.price||'') : ''}" oninput="calcPOItem(this)"></td>
        <td class="po-sub">¥0.00</td>
        <td><button class="btn btn-sm btn-danger" onclick="this.closest('tr').remove();calcPOTotal()">×</button>`;
    }
    $('poItemsBody').appendChild(row);
    // 回填产品选择
    if (prefill && prefill.productId) {
      const sel = row.querySelector('.po-prod');
      sel.value = prefill.productId;
      row.querySelector('.po-stock').innerHTML = getProductStockDetail(prefill.productId);
    }
    // 绑定产品选择事件
    row.querySelector('.po-prod').addEventListener('change', function(){
      const opt = this.options[this.selectedIndex];
      const pr = this.closest('tr');
      pr.querySelector('.po-stock').innerHTML = getProductStockDetail(this.value);
      const mode = getPOMode();
      if (mode === 'weight') {
        // 公斤模式：自动填充总重=数量×单件重，元/kg用参考价
        const qty = Number(pr.querySelector('.po-qty').value) || 0;
        const unitW = Number(opt.dataset.weight) || 0;
        pr.querySelector('.po-total-weight').value = qty > 0 && unitW > 0 ? (qty * unitW).toFixed(3) : '';
        if (!pr.querySelector('.po-kg-price').value) {
          pr.querySelector('.po-kg-price').value = opt.dataset.price || '';
        }
      } else {
        pr.querySelector('.po-price').value = opt.dataset.price || '';
      }
      calcPOItem(pr.querySelector('.po-qty'));
    });
    // 有回填数据时触发一次计算
    if (prefill) calcPOItem(row.querySelector('.po-qty'));
  };

  // 计算单行
  window.calcPOItem = function(el) {
    const row = el.closest('tr');
    const mode = getPOMode();
    const qty = Number(row.querySelector('.po-qty').value) || 0;
    let subtotal = 0;
    if (mode === 'weight') {
      const tw = Number(row.querySelector('.po-total-weight').value) || 0;
      const kgPrice = Number(row.querySelector('.po-kg-price').value) || 0;
      subtotal = tw * kgPrice;
    } else {
      const price = Number(row.querySelector('.po-price').value) || 0;
      subtotal = qty * price;
    }
    row.querySelector('.po-sub').textContent = fmtMoney(subtotal);
    calcPOTotal();
  };

  // 计算合计
  window.calcPOTotal = function() {
    const mode = getPOMode();
    let total = 0, totalQty = 0, totalWeight = 0;
    qsa('#poItemsBody tr').forEach(row => {
      const qty = Number(row.querySelector('.po-qty').value) || 0;
      totalQty += qty;
      if (mode === 'weight') {
        const tw = Number(row.querySelector('.po-total-weight').value) || 0;
        const kgPrice = Number(row.querySelector('.po-kg-price').value) || 0;
        total += tw * kgPrice;
        totalWeight += tw;
        // 自动算出该产品的单价（元/件）= 小计 / 数量
        const unitPriceEl = row.querySelector('.po-unit-price');
        if (unitPriceEl) unitPriceEl.textContent = qty > 0 ? (tw * kgPrice / qty).toFixed(2) + ' 元/件' : '-';
      } else {
        const price = Number(row.querySelector('.po-price').value) || 0;
        total += qty * price;
      }
    });
    $('poTotal').value = fmtMoney(total);
    const qtyEl = $('poTotalQty');
    if (qtyEl) qtyEl.value = totalQty;
    if (mode === 'weight') {
      const twEl = $('poTotalWeight');
      if (twEl) twEl.value = totalWeight > 0 ? totalWeight.toFixed(3) : '0';
    }
  };

  // 产品选择后自动填充（兼容新模式，用事件委托已在addPOItem中处理）
  // 移除旧的全局change监听，因为新模式在addPOItem中用addEventListener绑定
  // 保留旧事件但加个判断避免冲突
  document.removeEventListener('change', window._poProdChangeHandler);
  window._poProdChangeHandler = function(e) {
    if(e.target.classList.contains('po-prod') && getPOMode() === 'piece') {
      const row = e.target.closest('tr');
      const opt = e.target.options[e.target.selectedIndex];
      row.querySelector('.po-price').value = opt.dataset.price || '';
      row.querySelector('.po-stock').innerHTML = getProductStockDetail(e.target.value);
      calcPOItem(row.querySelector('.po-qty'));
    }
  };
  document.addEventListener('change', window._poProdChangeHandler);

  window.savePurchase = function(editId) {
    const mode = getPOMode();
    const items = [];
    let totalAmount = 0, totalQty = 0, totalWeight = 0;
    qsa('#poItemsBody tr').forEach(row => {
      const prodId = row.querySelector('.po-prod').value;
      const qty = Number(row.querySelector('.po-qty').value) || 0;
      const product = DB.find('products', prodId);
      if (mode === 'weight') {
        const totalWeightItem = Number(row.querySelector('.po-total-weight').value) || 0;
        const kgPrice = Number(row.querySelector('.po-kg-price').value) || 0;
        const subtotal = totalWeightItem * kgPrice;
        items.push({ productId: prodId, productName: product ? product.name : '', qty, totalWeight: totalWeightItem, kgPrice, subtotal });
        totalAmount += subtotal;
        totalQty += qty;
        totalWeight += totalWeightItem;
      } else {
        const price = Number(row.querySelector('.po-price').value) || 0;
        const subtotal = qty * price;
        items.push({ productId: prodId, productName: product ? product.name : '', qty, price, subtotal });
        totalAmount += subtotal;
        totalQty += qty;
      }
    });
    const data = {
      orderNo: $('poNo').value.trim() || ('PO' + today().replace(/-/g,'').slice(2) + String(purchases.length + 1).padStart(3, '0')),
      orderDate: $('poDate').value,
      supplier: $('poSupplier').value,
      items, totalAmount, totalQty, totalWeight, priceMode: mode,
      remark: ($('poRemark') || {}).value ? $('poRemark').value.trim() : '',
      status: 'pending'
    };
    if (!data.supplier) return toast('请选择供应商', 'error');
    if (!items.length) return toast('请添加采购明细', 'error');
    if (editId) {
      DB.update('purchases', editId, data); closeModal(); toast('采购单已更新'); render();
    } else {
      DB.add('purchases', data); closeModal(); toast('采购单已创建'); render();
    }
  };

  window.approvePurchase = function(id) {
    DB.update('purchases', id, { status: 'approved' }); toast('已审批通过'); render();
  };

  window.openPurchaseInbound = function(id) {
    const po = DB.find('purchases', id);
    const warehouses = DB.get('warehouses');
    const isWeight = po.priceMode === 'weight';
    openModal('采购入库 - ' + po.orderNo, `
      <table><thead><tr><th>产品</th><th>数量</th>${isWeight?`<th>总重(kg)</th><th>元/kg</th>`:'<th>单价(元)</th>'}<th>入库数量</th><th>当前库存</th><th>入仓库</th></tr></thead>
      <tbody>${po.items.map((item,i) => {
        const curStock = getProductStock(item.productId);
        return `<tr>
        <td>${item.productName}</td><td>${item.qty}</td>
        ${isWeight?`<td>${item.totalWeight||'-'}</td><td>${fmtMoney(item.kgPrice)}</td>`:`<td>${fmtMoney(item.price)}</td>`}
        <td><input class="form-control in-qty" type="number" max="${item.qty}" value="${item.qty - (item.inboundQty||0)}" data-idx="${i}"></td>
        <td>${curStock > 0 ? '<span style="color:var(--success);">'+curStock+'</span>' : '<span style="color:var(--text-light);">0</span>'}</td>
        <td><select class="form-control in-wh">${warehouses.map(w => `<option value="${w.id}">${w.name} (库存${DB.get('stock').filter(s=>s.warehouseId===w.id&&s.productId===item.productId).reduce((s,i)=>s+(i.quantity||0),0)})</option>`).join('')}</select></td>

    const po = DB.find('purchases', id);
    const rows = qsa('#modalBody tbody tr');
    let allDone = true;
    // 记录本次入库明细
    const inboundRecords = po.inboundRecords || [];
    rows.forEach((row, i) => {
      const qty = Number(row.querySelector('.in-qty').value)||0;
      const whId = row.querySelector('.in-wh').value;
      if(qty <= 0) return;
      const item = po.items[i];
      item.inboundQty = (item.inboundQty||0) + qty;
      // 更新库存（按公斤计价时，每件成本 = 总重 × 元/kg ÷ 数量）
      let unitCost = item.price || 0;
      if (po.priceMode === 'weight' && item.kgPrice && qty > 0) {
        unitCost = (item.totalWeight || 0) * item.kgPrice / qty;
      }
      addStock(item.productId, whId, qty, unitCost, 'purchase', po.orderNo);
      if(item.inboundQty < item.qty) allDone = false;
      // 记录入库流水
      inboundRecords.push({ productId: item.productId, productName: item.productName, qty, warehouseId: whId, date: new Date().toISOString() });
    });
    DB.update('purchases', id, { items: po.items, status: allDone ? 'completed' : 'partial', inboundRecords });
    closeModal(); toast('入库成功'); render();

        ${isWeight?`<td>${item.totalWeight||'-'}</td><td>${fmtMoney(item.kgPrice)}</td><td>${fmtMoney(item.subtotal)}</td><td>${unitPrice} 元/件</td>`:`<td>${fmtMoney(item.price)}</td><td>${fmtMoney(item.subtotal)}</td>`}
        <td>${item.inboundQty||0}</td>

  // 采购单反审入库：将已入库数量回退库存，退回待处理可编辑
  window.reversePurchase = function(id) {

// ========== 库存操作 ==========
function addStockFlow(productId, warehouseId, quantity, unitCost, sourceType, sourceNo) {
  // 记录出入库流水
  const flow = DB.get('stockFlow') || [];
  const product = DB.find('products', productId);
  const warehouse = DB.find('warehouses', warehouseId);
  flow.push({
    id: 'F' + Date.now() + String(Math.random()).slice(2,6),
    date: new Date().toISOString(),
    type: 'in', // 入库
    productId, productName: product ? product.name : '',
    warehouseId, warehouseName: warehouse ? warehouse.name : '',
    quantity,
    unitCost: unitCost || 0,
    amount: quantity * (unitCost || 0),
    sourceType: sourceType || '', // purchase/production/outsource/return 等
    sourceNo: sourceNo || ''
  });
  DB.set('stockFlow', flow);
}

function addStock(productId, warehouseId, quantity, unitCost, sourceType, sourceNo) {
  const stock = DB.get('stock');
  const existing = stock.find(s => s.productId === productId && s.warehouseId === warehouseId);
  if(existing) {
    const oldQty = existing.quantity;
    const newQty = oldQty + quantity;
    // 加权平均成本
    const totalCost = (oldQty * (existing.unitCost||0)) + (quantity * (unitCost||0));
    existing.unitCost = newQty > 0 ? totalCost / newQty : 0;
    existing.quantity = newQty;
    existing.updatedAt = new Date().toISOString();
    DB.set('stock', stock);
  } else {
    const product = DB.find('products', productId);
    const warehouse = DB.find('warehouses', warehouseId);
    DB.add('stock', {
      productId, warehouseId,
      productName: product ? product.name : '',
      warehouseName: warehouse ? warehouse.name : '',
      quantity, unitCost: unitCost || 0,
      warningLevel: 10
    });
  }
  // 记录入库流水
  if(quantity > 0) addStockFlow(productId, warehouseId, quantity, unitCost, sourceType, sourceNo);
}

function deductStock(productId, warehouseId, quantity, sourceType, sourceNo) {
  const stock = DB.get('stock');
  const existing = stock.find(s => s.productId === productId && s.warehouseId === warehouseId);
  if(existing) {
    const unitCost = existing.unitCost || 0; // 出库时用当前加权平均成本
    const amount = quantity * unitCost;
    existing.quantity = Math.max(0, existing.quantity - quantity);
    existing.updatedAt = new Date().toISOString();
    DB.set('stock', stock);
    // 记录出库流水
    if(quantity > 0) {
      const flow = DB.get('stockFlow') || [];
      const product = DB.find('products', productId);
      const warehouse = DB.find('warehouses', warehouseId);
      flow.push({
        id: 'F' + Date.now() + String(Math.random()).slice(2,6),
        date: new Date().toISOString(),
        type: 'out',
        productId, productName: product ? product.name : '',
        warehouseId, warehouseName: warehouse ? warehouse.name : '',
        quantity,
        unitCost,
        amount,
        sourceType: sourceType || '',
        sourceNo: sourceNo || ''
      });
      DB.set('stockFlow', flow);
    }
  }
}

// 获取某产品在所有仓库的总库存
function getProductStock(productId) {
  return DB.get('stock').filter(s => s.productId === productId).reduce((sum, s) => sum + (s.quantity||0), 0);
}

// 获取某产品在各仓库的库存明细文本
function getProductStockDetail(productId) {
  const items = DB.get('stock').filter(s => s.productId === productId && (s.quantity||0) > 0);
  if(!items.length) return '<span style="color:var(--danger);font-weight:600;">库存 0</span>';
  const total = items.reduce((s,i) => s + (i.quantity||0), 0);
  const color = total <= 10 ? 'var(--danger)' : 'var(--success)';
  const detail = items.map(i => `${i.warehouseName}:${i.quantity}`).join('、');
  return `<span style="color:${color};font-weight:600;">库存 ${total}</span> <span style="font-size:11px;color:var(--text-secondary);">(${detail})</span>`;
}

    openModal(wo ? '编辑生产工单' : '新建生产工单', `

        <div class="form-group"><label>工单号</label><input class="form-control" id="woNo" value="${orderNo}"></div>
        <div class="form-group"><label>计划完成日期</label><input class="form-control" id="woDate" type="date" value="${wo ? wo.dueDate : today()}"></div>

      <div class="form-group"><label>生产产品 <span class="required">*</span></label>
        <div style="display:flex;gap:12px;align-items:flex-start;">
          <select class="form-control" id="woProduct" style="flex:1;" onchange="updateWOStock()">

            ${prods.map(p => `<option value="${p.id}" ${wo && wo.productId===p.id?'selected':''}>${p.name} (${p.spec||''})</option>`).join('')}
          </select>

      <td><select class="form-control mat-wh">${warehouses.map(w => `<option value="${w.id}">${w.name}</option>`).join('')}</select></td>
      <td class="mat-stock" style="font-size:12px;">-</td>`;

      const stockEl = this.closest('tr').querySelector('.mat-stock');
      stockEl.innerHTML = this.value ? getProductStockDetail(this.value) : '-';
    });

  window.doStartProduction = function(id) {
    const wo = DB.find('production', id);
    // 消耗原材料库存
    const materialRecords = [];
    document.querySelectorAll('#matConsume tbody tr').forEach(row => {
      const prodId = row.querySelector('.mat-prod').value;
      const qty = Number(row.querySelector('.mat-qty').value) || 0;

      if(prodId && qty > 0) {
        deductStock(prodId, whId, qty, 'production', wo.orderNo);
        const prod = DB.find('products', prodId);
        materialRecords.push({ productId: prodId, productName: prod ? prod.name : '', qty, warehouseId: whId });
      }

      <tbody>${wo.materialRecords.map(m => `<tr><td>${m.productName}</td><td>${m.qty}</td></tr>`).join('')}</tbody></table>
      ` : ''}
      ${wo.remark ? `<div style="margin-top:12px;color:var(--text-secondary);">备注：${wo.remark}</div>` : ''}
    `, `<button class="btn btn-outline" onclick="closeModal()">关闭</button>`);
  };

  // 反审生产：退回待处理，恢复原材料库存
  window.reverseProduction = function(id) {
    const wo = DB.find('production', id);
    const records = wo.materialRecords || [];
    showConfirm('反审生产确认',
      records.length ? `将恢复消耗的原材料（${records.length} 项），工单退回为"待处理"状态。` : '工单退回为"待处理"状态。',
      () => {
        records.forEach(r => {
          addStock(r.productId, r.warehouseId, r.qty, 0, 'production_reverse', wo.orderNo);
        });
        DB.update('production', id, { status: 'pending', materialRecords: [], startDate: null });
        toast('生产已反审，原料库存已恢复'); render();
      }, '↩️');
  };

  // 反审完工入库：回退成品库存
  window.reverseComplete = function(id) {
    const wo = DB.find('production', id);
    const qty = wo.completedQty || 0;
    const whId = wo.completeWarehouseId || wo.warehouseId;
    showConfirm('反审完工入库确认',
      `将回退成品入库数量 ${qty}，工单退回为"生产中"状态。`,
      () => {
        deductStock(wo.productId, whId, qty, 'production_reverse', wo.orderNo);
        DB.update('production', id, { status: 'producing', completedQty: 0, completeDate: null, completeWarehouseId: null });
        toast('完工入库已反审'); render();
      }, '↩️');
  };

  render();
}

// ========== 销售管理 ==========
function renderSales(el) {
  const sales = DB.get('sales');
  const customers = DB.get('customers');

  function render() {
    let list = [...sales].sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
    el.innerHTML = `
      <div class="toolbar">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="saleSearch" placeholder="搜索单号/客户..." oninput="filterSale()">
        </div>
        <label style="font-size:13px;color:var(--text-secondary);white-space:nowrap;">日期：</label>
        <input type="date" id="saleDateFrom" class="form-control" style="width:140px;" onchange="filterSale()">
        <span style="font-size:13px;color:var(--text-secondary);">至</span>
        <input type="date" id="saleDateTo" class="form-control" style="width:140px;" onchange="filterSale()">
        <button class="btn btn-sm btn-outline" onclick="setDateRange('saleDateFrom','saleDateTo','month',filterSale)">当月</button>
        <button class="btn btn-sm btn-outline" onclick="setDateRange('saleDateFrom','saleDateTo','year',filterSale)">今年</button>
        <button class="btn btn-outline" onclick="resetSaleFilter()">重置</button>
        <button class="btn btn-outline" onclick="openCustomerForm()">+ 管理客户</button>
        <button class="btn btn-primary" onclick="openSaleForm()">+ 新增销售单</button>
      </div>
      <div class="card" style="padding:0;">
        <div class="table-wrapper">
          <table>
            <thead><tr><th>销售单号</th><th>客户</th><th>日期</th><th>金额</th><th>状态</th><th>收款</th><th>操作</th></tr></thead>
            <tbody>${list.length ? list.map(s => saleRow(s)).join('') : '<tr><td colspan="7"><div class="empty-state"><p>暂无销售记录</p></div></td></tr>'}</tbody>
          </table>
        </div>
      </div>
    `;
  }

  function saleRow(s) {
    const paidAmt = (s.payments||[]).reduce((sum,p) => sum + (Number(p.amount)||0), 0);
    const unpaid = (Number(s.totalAmount)||0) - paidAmt;
    return `<tr>
      <td><strong>${s.orderNo}</strong></td><td>${s.customer}</td>
      <td>${fmtDate(s.orderDate)}</td><td>${fmtMoney(s.totalAmount)}</td>
      <td>${statusBadge(s.status)}</td>
      <td style="font-size:12px;">${paidAmt > 0 ? '<span style="color:var(--success);">已收 '+fmtMoney(paidAmt)+'</span>' : ''}${unpaid > 0 ? '<span style="color:'+(paidAmt>0?'var(--text-secondary)':'var(--danger)')+';">'+(paidAmt>0?' / 欠':'欠')+fmtMoney(unpaid)+'</span>' : ''}</td>
      <td class="table-actions">
        <button class="btn btn-sm btn-outline" onclick="viewSale('${s.id}')">详情</button>
        ${s.status==='pending'?`<button class="btn btn-sm btn-info" onclick="openSaleForm('${s.id}')">编辑</button>`:''}
        ${s.status==='pending'?`<button class="btn btn-sm btn-success" onclick="approveSale('${s.id}')">确认</button>`:''}
        ${s.status==='approved'?`<button class="btn btn-sm btn-warning" onclick="shipSale('${s.id}')">发货</button>`:''}
        ${s.status!=='cancelled'?`<button class="btn btn-sm btn-outline" onclick="addSalePayment('${s.id}')" title="收款">💰</button>`:''}
        ${s.status==='pending'?`<button class="btn btn-sm btn-danger" onclick="deleteSale('${s.id}')">删除</button>`:''}
        ${s.status==='approved'?`<button class="btn btn-sm btn-outline" onclick="reverseSale('${s.id}')" title="反审">↩ 反审</button>`:''}
        ${s.status==='shipped'?`<button class="btn btn-sm btn-outline" onclick="reverseShipment('${s.id}')" title="反审发货">↩ 反审发货</button>`:''}
        ${s.status==='invoiced'?`<button class="btn btn-sm btn-outline" onclick="reverseInvoice('${s.id}')" title="反审开票">↩ 反审开票</button>`:''}
      </td>
    </tr>`;
  }

  window.filterSale = function() {
    const kw = ($('saleSearch')||{}).value || '';
    const from = ($('saleDateFrom')||{}).value || '';
    const to = ($('saleDateTo')||{}).value || '';
    const list = sales.filter(s => {
      const matchKw = !kw || (s.orderNo+s.customer).toLowerCase().includes(kw.toLowerCase());
      const d = (s.orderDate||'').slice(0,10);
      return matchKw && (!from || d >= from) && (!to || d <= to);
    });
    document.querySelector('#mainContent .card tbody').innerHTML = list.length ? list.map(saleRow).join('') : '<tr><td colspan="7"><div class="empty-state"><p>无匹配结果</p></div></td></tr>';
  };
  window.resetSaleFilter = function() {
    const s = $('saleSearch'); if(s) s.value = '';
    const f = $('saleDateFrom'); if(f) f.value = '';
    const t = $('saleDateTo'); if(t) t.value = '';
    filterSale();
  };

  window.openSaleForm = function(editId) {
    const prods = DB.get('products');
    const custs = DB.get('customers');
    const so = editId ? DB.find('sales', editId) : null;
    const orderNo = so ? so.orderNo : ('SO' + today().replace(/-/g,'').slice(2) + String(sales.length+1).padStart(3,'0'));
    const soDate = so ? (so.orderDate||today()) : today();
    const soRemark = so ? (so.remark||'') : '';
    const soCustomer = so ? so.orderNo : ''; // will be set via selected below

    // 构建产品行（编辑时回填）
    const buildItemRow = (item) => {
      const selOpts = prods.map(p => `<option value="${p.id}" data-price="${p.price}" ${item&&item.productId===p.id?'selected':''}>${p.name} (${p.spec||''})</option>`).join('');
      return `<tr>
        <td><select class="form-control so-prod">${selOpts}</select></td>
        <td class="so-stock" style="font-size:12px;">-</td>
        <td><input class="form-control so-qty" type="number" min="1" value="${item?item.qty:1}" oninput="calcSOItem(this)"></td>
        <td><input class="form-control so-price" type="number" step="0.01" value="${item?item.price:''}" oninput="calcSOItem(this)"></td>
        <td class="so-sub">${item?fmtMoney(item.subtotal):'¥0.00'}</td>
        <td><button class="btn btn-sm btn-danger" onclick="this.closest('tr').remove();calcSOTotal()">×</button></td>
      </tr>`;
    };
    const itemRows = so && so.items && so.items.length ? so.items.map(item => buildItemRow(item)).join('') : buildItemRow(null);

    openModal(so ? '编辑销售单' : '新增销售单', `
      <div class="form-row">
        <div class="form-group"><label>销售单号</label><input class="form-control" id="soNo" value="${orderNo}"></div>
        <div class="form-group"><label>销售日期</label><input class="form-control" id="soDate" type="date" value="${soDate}"></div>
      </div>
      <div class="form-group"><label>客户 <span class="required">*</span></label>
        <select class="form-control" id="soCustomer">
          <option value="">请选择客户</option>
          ${custs.map(c => `<option value="${c.name}" ${so&&so.customer===c.name?'selected':''}>${c.name} ${c.contact?'('+c.contact+')':''}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label>销售明细</label>
        <table id="soItems">
          <thead><tr><th>产品</th><th>库存</th><th>数量</th><th>单价</th><th>小计</th><th></th></tr></thead>
          <tbody>${itemRows}</tbody>
        </table>
        <button class="btn btn-sm btn-outline" style="margin-top:8px;" onclick="addSOItem()">+ 添加行</button>
      </div>
      <div class="form-row">
        <div class="form-group"><label>合计金额</label><input class="form-control" id="soTotal" value="${so?fmtMoney(so.totalAmount):'¥0.00'}" readonly style="font-weight:700;font-size:16px;color:var(--success);"></div>
        <div class="form-group"><label>备注</label><input class="form-control" id="soRemark" value="${soRemark}"></div>
      </div>
    `, `<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveSale('${editId||''}')">保存</button>`);

    setTimeout(() => {
      qsa('.so-prod').forEach(sel => {
        sel.dispatchEvent(new Event('change'));
        // 回填价格不要覆盖（编辑模式下已有价格）
      });
      calcSOTotal();
    }, 50);
  };

  window.addSOItem = function() {
    const prods = DB.get('products');
    const row = document.createElement('tr');
    row.innerHTML = `
      <td><select class="form-control so-prod">${prods.map(p => `<option value="${p.id}" data-price="${p.price}">${p.name} (${p.spec||''})</option>`).join('')}</select></td>
      <td class="so-stock" style="font-size:12px;">-</td>
      <td><input class="form-control so-qty" type="number" min="1" value="1" oninput="calcSOItem(this)"></td>
      <td><input class="form-control so-price" type="number" step="0.01" oninput="calcSOItem(this)"></td>
      <td class="so-sub">¥0.00</td>
      <td><button class="btn btn-sm btn-danger" onclick="this.closest('tr').remove();calcSOTotal()">×</button>`;
    $('soItems').querySelector('tbody').appendChild(row);
    row.querySelector('.so-prod').addEventListener('change', function(){
      this.closest('tr').querySelector('.so-price').value = this.options[this.selectedIndex].dataset.price;
      this.closest('tr').querySelector('.so-stock').innerHTML = getProductStockDetail(this.value);
      calcSOItem(this.closest('tr').querySelector('.so-qty'));
    });
  };

  window.calcSOItem = function(el) {
    const row = el.closest('tr');
    const qty = Number(row.querySelector('.so-qty').value)||0;
    const price = Number(row.querySelector('.so-price').value)||0;
    row.querySelector('.so-sub').textContent = fmtMoney(qty*price);
    calcSOTotal();
  };

  window.calcSOTotal = function() {
    let total = 0;
    qsa('#soItems tbody tr').forEach(row => {
      total += (Number(row.querySelector('.so-qty').value)||0) * (Number(row.querySelector('.so-price').value)||0);
    });
    $('soTotal').value = fmtMoney(total);
  };

  document.addEventListener('change', e => {
    if(e.target.classList.contains('so-prod')) {
      const row = e.target.closest('tr');
      row.querySelector('.so-price').value = e.target.options[e.target.selectedIndex].dataset.price || '';
      row.querySelector('.so-stock').innerHTML = getProductStockDetail(e.target.value);
      calcSOItem(row.querySelector('.so-qty'));
    }
  });

  window.saveSale = function(editId) {
    const items = [];
    let totalAmount = 0;
    qsa('#soItems tbody tr').forEach(row => {
      const prodId = row.querySelector('.so-prod').value;
      const qty = Number(row.querySelector('.so-qty').value)||0;
      const price = Number(row.querySelector('.so-price').value)||0;
      const product = DB.find('products', prodId);
      items.push({ productId: prodId, productName: product?product.name:'', qty, price, subtotal: qty*price });
      totalAmount += qty*price;
    });
    const data = {
      orderNo: $('soNo').value.trim() || ('SO' + today().replace(/-/g,'').slice(2) + String(sales.length+1).padStart(3,'0')),
      orderDate: $('soDate').value,
      customer: $('soCustomer').value,
      items, totalAmount,
      remark: $('soRemark').value.trim(),
    };
    if(!data.customer) return toast('请选择客户','error');
    if(!items.length) return toast('请添加销售明细','error');
    if(editId) {
      DB.update('sales', editId, data);
      closeModal(); toast('销售单已更新'); render();
    } else {
      DB.add('sales', { ...data, status: 'pending' });
      closeModal(); toast('销售单已创建'); render();
    }
  };
