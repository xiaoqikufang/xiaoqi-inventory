  window.approveSale = function(id) { DB.update('sales', id, { status: 'approved' }); toast('已确认'); render(); };

  window.shipSale = function(id) {
    const so = DB.find('sales', id);
    const warehouses = DB.get('warehouses');
    const customer = DB.get('customers').find(c => c.name === so.customer);
    openModal('发货确认 - ' + so.orderNo, `
      <div style="background:var(--success-light);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;">
        <strong>收货信息</strong>
        <div class="form-row" style="margin-top:8px;">
          <div class="form-group" style="margin:0;"><label>收货人</label><input class="form-control" id="shipReceiver" value="${customer?customer.contact||'':''}"></div>
          <div class="form-group" style="margin:0;"><label>联系电话</label><input class="form-control" id="shipPhone" value="${customer?customer.phone||'':''}"></div>
          <div class="form-group" style="margin:0;"><label>收货地址</label><input class="form-control" id="shipAddr" value="${customer?customer.address||'':''}"></div>
        </div>
      </div>

      <div style="background:var(--warning-light);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;">
        <strong>物流信息</strong>
        <div class="form-row" style="margin-top:8px;">
          <div class="form-group" style="margin:0;"><label>物流公司</label><input class="form-control" id="shipLogistics" placeholder="如：顺丰、中通等"></div>
          <div class="form-group" style="margin:0;"><label>物流单号</label><input class="form-control" id="shipTrackNo" placeholder="请输入物流跟踪号"></div>
          <div class="form-group" style="margin:0;"><label>发货日期</label><input class="form-control" id="shipDate" type="date" value="${today()}"></div>
        </div>
      </div>

      <div style="background:#eff6ff;border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;">
        <strong>发货明细</strong>
        <table style="margin-top:8px;"><thead><tr><th>产品</th><th>发货数量</th><th>当前库存</th><th>发出仓库</th></tr></thead>
        <tbody>${so.items.map((item,i) => {
          const stockQty = getProductStock(item.productId);
          return `<tr>
            <td>${item.productName}</td>
            <td><strong>${item.qty}</strong></td>
            <td>${stockQty > 0 ? '<span style="color:var(--success);">'+stockQty+'</span>' : '<span style="color:var(--danger);font-weight:600;">'+stockQty+' (库存不足!)</span>'}</td>
            <td><select class="form-control ship-wh">${warehouses.map(w => `<option value="${w.id}">${w.name} (库存${DB.get('stock').filter(s=>s.warehouseId===w.id&&s.productId===item.productId).reduce((s,i)=>s+(i.quantity||0),0)})</option>`).join('')}</select></td>
          </tr>`;
        }).join('')}</tbody></table>
      </div>

      <div class="form-group"><label>发货备注</label><textarea class="form-control" id="shipRemark" rows="2" placeholder="如有特殊发货要求请备注"></textarea></div>
    `, `<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-warning" onclick="doShip('${id}')">确认发货</button>`);
  };

  window.doShip = function(id) {
    const receiver = $('shipReceiver').value.trim();
    const phone = $('shipPhone').value.trim();
    if(!receiver) return toast('请填写收货人','error');
    if(!phone) return toast('请填写联系电话','error');

    const so = DB.find('sales', id);
    const rows = qsa('#modalBody tbody tr');
    // 检查库存是否充足
    let stockOk = true;
    rows.forEach((row, i) => {
      const whId = row.querySelector('.ship-wh').value;
      const whStock = DB.get('stock').find(s => s.productId === so.items[i].productId && s.warehouseId === whId);
      const available = whStock ? whStock.quantity : 0;
      if(available < so.items[i].qty) stockOk = false;
    });
    if(!stockOk) {
      showConfirm('库存不足', '部分产品库存不足，是否继续发货？', () => {
        executeShip(id, rows, so);
      }, '⚠️');
      return;
    }
    executeShip(id, rows, so);
  };

  window.executeShip = function(id, rows, so) {
    const shipmentRecords = [];
    const costRecords = []; // 记录每个产品的发货时成本价
    rows.forEach((row, i) => {
      const whId = row.querySelector('.ship-wh').value;
      const item = so.items[i];
      // 获取发货前的库存成本价
      const whStock = DB.get('stock').find(s => s.productId === item.productId && s.warehouseId === whId);
      const shipUnitCost = whStock ? (whStock.unitCost || 0) : 0;
      costRecords.push({ productId: item.productId, productName: item.productName, qty: item.qty, unitCost: shipUnitCost, totalCost: item.qty * shipUnitCost });
      deductStock(item.productId, whId, item.qty, 'sale', so.orderNo);
      shipmentRecords.push({ productId: item.productId, productName: item.productName, qty: item.qty, warehouseId: whId });
    });
    DB.update('sales', id, {
      status: 'shipped',
      shipDate: $('shipDate').value,
      shipmentRecords,
      costRecords, // 发货时每个产品的成本记录
      shipInfo: {
        receiver: $('shipReceiver').value.trim(),
        phone: $('shipPhone').value.trim(),
        address: $('shipAddr').value.trim(),
        logistics: $('shipLogistics').value.trim(),
        trackNo: $('shipTrackNo').value.trim(),
        remark: $('shipRemark').value.trim()
      }
    });
    closeModal(); toast('发货成功'); render();
  };

  window.viewSale = function(id) {
    const so = DB.find('sales', id);
    const si = so.shipInfo || {};
    const paidAmt = (so.payments||[]).reduce((sum,p) => sum + (Number(p.amount)||0), 0);
    const unpaid = (Number(so.totalAmount)||0) - paidAmt;
    openModal('销售单详情 - ' + so.orderNo, `
      <div class="form-row" style="margin-bottom:12px;">
        <div><strong>客户：</strong>${so.customer}</div>
        <div><strong>日期：</strong>${fmtDate(so.orderDate)}</div>
        <div><strong>状态：</strong>${statusBadge(so.status)}</div>
      </div>
      <table><thead><tr><th>产品</th><th>数量</th><th>单价</th><th>小计</th></tr></thead>
      <tbody>${so.items.map(item => `<tr>
        <td>${item.productName}</td><td>${item.qty}</td><td>${fmtMoney(item.price)}</td><td>${fmtMoney(item.subtotal)}</td>
      </tr>`).join('')}</tbody></table>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;font-size:16px;">
        <span style="font-weight:700;">合计：${fmtMoney(so.totalAmount)}</span>
        <span style="font-size:13px;">
          <span style="color:var(--success);">已收 ${fmtMoney(paidAmt)}</span>
          ${unpaid > 0 ? `<span style="color:var(--danger);margin-left:12px;">欠 ${fmtMoney(unpaid)}</span>` : '<span style="color:var(--success);margin-left:12px;font-weight:600;">✓ 已结清</span>'}
        </span>
      </div>
      ${(so.payments||[]).length ? `
      <hr style="margin:12px 0;border:none;border-top:1px dashed var(--border);">
      <div style="background:var(--success-light);border-radius:var(--radius);padding:12px 16px;">
        <strong style="color:var(--success);">💳 收款记录</strong>
        <table style="margin-top:8px;"><thead><tr><th>日期</th><th>金额</th><th>方式</th><th>备注</th></tr></thead>
        <tbody>${so.payments.map(p => `<tr>
          <td>${fmtDate(p.date)}</td><td style="color:var(--success);font-weight:600;">${fmtMoney(p.amount)}</td><td>${p.method||'-'}</td><td>${p.remark||'-'}</td>
        </tr>`).join('')}</tbody></table>
      </div>` : ''}
      ${so.remark ? `<div style="margin-top:12px;color:var(--text-secondary);">备注：${so.remark}</div>` : ''}
      ${si.receiver ? `
      <hr style="margin:16px 0;border:none;border-top:1px dashed var(--border);">
      <div style="background:#eff6ff;border-radius:var(--radius);padding:12px 16px;">
        <strong style="color:var(--primary);">📦 发货信息</strong>
        <div class="form-row" style="margin-top:8px;">
          <div><strong>收货人：</strong>${si.receiver}</div>
          <div><strong>联系电话：</strong>${si.phone}</div>
          <div><strong>收货地址：</strong>${si.address||'-'}</div>
        </div>
        <div class="form-row" style="margin-top:8px;">
          <div><strong>物流公司：</strong>${si.logistics||'-'}</div>
          <div><strong>物流单号：</strong>${si.trackNo||'-'}</div>
          <div><strong>发货日期：</strong>${fmtDate(so.shipDate)}</div>
        </div>
        ${si.remark ? `<div style="margin-top:8px;color:var(--text-secondary);">发货备注：${si.remark}</div>` : ''}
      </div>` : ''}
    `, `<button class="btn btn-outline" onclick="closeModal()">关闭</button>
        ${so.status!=='cancelled'?`<button class="btn btn-success" onclick="closeModal();addSalePayment('${id}')">💰 收款</button>`:''}`);
  };

  window.deleteSale = function(id) { showConfirm('删除销售单','此操作不可恢复', () => { DB.remove('sales',id); toast('已删除'); render(); }, '🗑️'); };

  // 销售单反审：已确认 → 退回待处理
  window.reverseSale = function(id) {
    showConfirm('反审确认','将此销售单从"已确认"退回为"待处理"，是否继续？', () => {
      DB.update('sales', id, { status: 'pending' });
      toast('已反审退回待处理'); render();
    }, '↩️');
  };

  // 反审发货：恢复库存，退回已确认状态
  window.reverseShipment = function(id) {
    const so = DB.find('sales', id);
    const records = so.shipmentRecords || [];
    if(!records.length) return toast('没有发货记录','error');
    showConfirm('反审发货确认',
      `将恢复发货时扣减的库存（${records.length} 项），销售单退回为"已确认"状态。\n已有的收款记录不受影响。`,
      () => {
        records.forEach(r => {
          addStock(r.productId, r.warehouseId, r.qty, 0, 'sale_reverse', so.orderNo);
        });
        DB.update('sales', id, { status: 'approved', shipmentRecords: [], shipInfo: {} });
        toast('发货已反审，库存已恢复'); render();
      }, '↩️');
  };

  // 反审开票：如果有关联发票，删除并退回已发货
  window.reverseInvoice = function(id) {
    const so = DB.find('sales', id);
    const invoices = DB.get('invoices');
    const linked = invoices.filter(i => i.saleOrderId === id);
    showConfirm('反审开票确认',
      linked.length ? `此销售单关联了 ${linked.length} 张发票，将一并删除。\n销售单退回为"已发货"状态。` : '销售单退回为"已发货"状态。',
      () => {
        linked.forEach(inv => DB.remove('invoices', inv.id));
        DB.update('sales', id, { status: 'shipped' });
        toast('开票已反审'); render();
      }, '↩️');
  };

  // ===== 销售收款/预付款 =====
  window.addSalePayment = function(id) {
    const so = DB.find('sales', id);
    const paidAmt = (so.payments||[]).reduce((sum,p) => sum + (Number(p.amount)||0), 0);
    const unpaid = (Number(so.totalAmount)||0) - paidAmt;
    const methods = DB.get('paymentMethods') || ['银行转账','现金','承兑汇票','支票','微信/支付宝'];
    openModal('收款登记 - ' + so.orderNo, `
      <div class="form-row" style="margin-bottom:12px;">
        <div><strong>客户：</strong>${so.customer}</div>
        <div><strong>订单金额：</strong>${fmtMoney(so.totalAmount)}</div>
        <div><strong>已收：</strong><span style="color:var(--success);">${fmtMoney(paidAmt)}</span></div>
        <div><strong>未收：</strong><span style="color:${unpaid>0?'var(--danger)':'var(--success)'};">${fmtMoney(unpaid)}</span></div>
      </div>
      ${paidAmt > 0 ? `<div style="margin-bottom:12px;">
        <strong>收款记录：</strong>
        <table><thead><tr><th>日期</th><th>金额</th><th>方式</th><th>备注</th></tr></thead>
        <tbody>${so.payments.map(p => `<tr>
          <td>${fmtDate(p.date)}</td><td style="color:var(--success);">${fmtMoney(p.amount)}</td><td>${p.method||'-'}</td><td>${p.remark||'-'}</td>
        </tr>`).join('')}</tbody></table>
      </div>` : ''}
      <hr style="margin:12px 0;border:none;border-top:1px dashed var(--border);">
      <div class="form-row">
        <div class="form-group"><label>收款金额 <span class="required">*</span></label>
          <input class="form-control" id="payAmt" type="number" step="0.01" value="${unpaid > 0 ? unpaid : ''}">
        </div>
        <div class="form-group"><label>收款方式</label>
          <select class="form-control" id="payMethod">${methods.map(m => `<option>${m}</option>`).join('')}</select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>收款日期</label><input class="form-control" id="payDate" type="date" value="${today()}"></div>
        <div class="form-group"><label>备注</label><input class="form-control" id="payRemark" placeholder="如：预付款、尾款等"></div>
      </div>
    `, `<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-success" onclick="doAddPayment('${id}')">确认收款</button>`);
  };

  window.doAddPayment = function(id) {
    const amt = Number($('payAmt').value)||0;
    if(amt <= 0) return toast('请输入收款金额','error');
    const so = DB.find('sales', id);
    const payments = so.payments || [];
    payments.push({
      amount: amt,
      method: $('payMethod').value,
      date: $('payDate').value || today(),
      remark: $('payRemark').value.trim(),
      createdAt: new Date().toISOString()
    });
    DB.update('sales', id, { payments });
    // 收款满额则自动完成
    const totalPaid = payments.reduce((s,p) => s + (Number(p.amount)||0), 0);
    if(totalPaid >= (Number(so.totalAmount)||0)) {
      DB.update('sales', id, { status: 'completed' });
      closeModal(); toast('收款完成，订单已自动完结'); render();
    } else {
      closeModal(); toast('收款已登记'); render();
    }
  };

  window.openCustomerForm = function() {
    const custs = DB.get('customers');
    openModal('客户管理', `
      <div style="margin-bottom:16px;">
        <div class="form-row">
          <div class="form-group"><label>客户名称</label><input class="form-control" id="custName"></div>
          <div class="form-group"><label>联系人</label><input class="form-control" id="custContact"></div>
          <div class="form-group"><label>电话</label><input class="form-control" id="custPhone"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>地址</label><input class="form-control" id="custAddr"></div>
          <div class="form-group"><label>纳税识别号</label><input class="form-control" id="custTax"></div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="addCustomer()">添加客户</button>
      </div>
      <div class="table-wrapper"><table>
        <thead><tr><th>名称</th><th>联系人</th><th>电话</th><th>纳税识别号</th><th>操作</th></tr></thead>
        <tbody>${custs.map(c => `<tr>
          <td>${c.name}</td><td>${c.contact||'-'}</td><td>${c.phone||'-'}</td><td>${c.taxId||'-'}</td>
          <td><button class="btn btn-sm btn-danger" onclick="removeCust('${c.id}')">删除</button></td>
        </tr>`).join('')}</tbody>
      </table></div>
    `, `<button class="btn btn-outline" onclick="closeModal()">关闭</button>`);
  };

  window.addCustomer = function() {
    const name = $('custName').value.trim();
    if(!name) return toast('请输入客户名称','error');
    DB.add('customers', { name, contact:$('custContact').value.trim(), phone:$('custPhone').value.trim(), address:$('custAddr').value.trim(), taxId:$('custTax').value.trim() });
    toast('客户已添加'); closeModal(); openSaleForm();
  };

  window.removeCust = function(id) { DB.remove('customers',id); toast('已删除'); openCustomerForm(); };

  render();
}

// ========== 外协加工 ==========
function renderOutsource(el) {
  const outsource = DB.get('outsource');
  const partners = DB.get('partners');

  function render() {
    let list = [...outsource].sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
    el.innerHTML = `
      <div class="toolbar">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="osSearch" placeholder="搜索单号/协作方..." oninput="filterOutsource()">
        </div>
        <label style="font-size:13px;color:var(--text-secondary);white-space:nowrap;">日期：</label>
        <input type="date" id="osDateFrom" class="form-control" style="width:140px;" onchange="filterOutsource()">
        <span style="font-size:13px;color:var(--text-secondary);">至</span>
        <input type="date" id="osDateTo" class="form-control" style="width:140px;" onchange="filterOutsource()">
        <button class="btn btn-sm btn-outline" onclick="setDateRange('osDateFrom','osDateTo','month',filterOutsource)">当月</button>
        <button class="btn btn-sm btn-outline" onclick="setDateRange('osDateFrom','osDateTo','year',filterOutsource)">今年</button>
        <button class="btn btn-outline" onclick="resetOsFilter()">重置</button>
        <button class="btn btn-outline" onclick="openPartnerForm()">+ 管理协作方</button>
        <span id="osBatchBar" style="display:none;margin-left:8px;color:var(--success);font-size:13px;">已选 <strong id="osSelCount">0</strong> 条 <button class="btn btn-sm btn-info" onclick="openBatchEditOS()">批量编辑</button></span>
        <button class="btn btn-primary" onclick="openOutsourceForm()">+ 新增外协单</button>
      </div>
      <div class="card" style="padding:0;">
        <div class="table-wrapper">
          <table>
            <thead><tr><th><input type="checkbox" id="osCheckAll" onchange="toggleOSCheckAll(this)"></th><th>外协单号</th><th>协作方</th><th>加工产品</th><th>发出数量</th><th>收回数量</th><th>费用</th><th>状态</th><th>操作</th></tr></thead>
            <tbody>${list.length ? list.map(o => outsourceRow(o)).join('') : '<tr><td colspan="9"><div class="empty-state"><p>暂无外协记录</p></div></td></tr>'}</tbody>
          </table>
        </div>
      </div>
    `;
  }

  window.filterOutsource = function() {
    const kw = ($('osSearch')||{}).value || '';
    const from = ($('osDateFrom')||{}).value || '';
    const to = ($('osDateTo')||{}).value || '';
    const list = outsource.filter(o => {
      const matchKw = !kw || (o.orderNo+o.partner).toLowerCase().includes(kw.toLowerCase());
      const d = (o.orderDate||'').slice(0,10);
      return matchKw && (!from || d >= from) && (!to || d <= to);
    });
    document.querySelector('#mainContent .card tbody').innerHTML = list.length
      ? list.map(o => outsourceRow(o)).join('')
      : '<tr><td colspan="9"><div class="empty-state"><p>无匹配结果</p></div></td></tr>';
    updateOSBatchBar();
  };

  // 外协行渲染
  function outsourceRow(o) {
    const items = o.items || [];
    const prodInfo = items.length > 0
      ? items.map(i => i.productName + '(' + i.qty + '件×' + (i.unitPrice||0) + '元)').join('，')
      : (o.productName || '-');
    const totalQty = items.length > 0 ? items.reduce((s,i)=>s+(i.qty||0),0) : (o.sendQty||0);
    const retQty = o.returnQty || 0;
    return `<tr>
      <td><input type="checkbox" class="os-check" value="${o.id}" onchange="updateOSBatchBar()"></td>
      <td><strong>${o.orderNo}</strong></td><td>${o.partner}</td>
      <td style="font-size:12px;max-width:200px;">${prodInfo}</td>
      <td>${totalQty}</td><td>${retQty}</td>
      <td>${fmtMoney(o.totalAmount)}</td><td>${statusBadge(o.status)}</td>
      <td class="table-actions">
        <button class="btn btn-sm btn-outline" onclick="viewOutsource('${o.id}')">详情</button>
        ${o.status==='pending'?`<button class="btn btn-sm btn-info" onclick="openOutsourceForm('${o.id}')">编辑</button>`:''}
        ${o.status==='pending'?`<button class="btn btn-sm btn-success" onclick="sendOutsource('${o.id}')">发出</button>`:''}
        ${o.status==='processing'?`<button class="btn btn-sm btn-warning" onclick="returnOutsource('${o.id}')">收回</button>`:''}
        ${o.status==='pending'?`<button class="btn btn-sm btn-danger" onclick="deleteOutsource('${o.id}')">删除</button>`:''}
        ${o.status==='processing'?`<button class="btn btn-sm btn-outline" onclick="reverseOutsourceSend('${o.id}')" title="反审发出，恢复库存">↩ 反审发出</button>`:''}
        ${o.status==='completed'?`<button class="btn btn-sm btn-outline" onclick="reverseOutsourceReturn('${o.id}')" title="反审收回入库">↩ 反审收回</button>`:''}
      </td>
    </tr>`;
  }

  // 全选/取消
  window.toggleOSCheckAll = function(el) {
    qsa('.os-check').forEach(cb => cb.checked = el.checked);
    updateOSBatchBar();
  };

  // 更新批量操作栏
  window.updateOSBatchBar = function() {
    const checked = qsa('.os-check:checked');
    const bar = $('osBatchBar');
    const cnt = $('osSelCount');
    if (bar) bar.style.display = checked.length > 0 ? 'inline' : 'none';
    if (cnt) cnt.textContent = checked.length;
  };

  // 批量编辑外协单数量/单价
  window.openBatchEditOS = function() {
    const checked = qsa('.os-check:checked');
    if (!checked.length) return toast('请先选择要编辑的外协单','error');
    const ids = Array.from(checked).map(cb => cb.value);
    const list = ids.map(id => DB.find('outsource', id)).filter(Boolean);
    // 构建每个外协单的明细行
    let rows = '';
    list.forEach(o => {
      const items = o.items || [];
      if (items.length > 0) {
        items.forEach((item, idx) => {
          rows += `<tr data-id="${o.id}" data-idx="${idx}">
            <td style="font-size:12px;">${o.orderNo}</td>
            <td style="font-size:12px;">${item.productName}</td>
            <td><input class="form-control be-qty" type="number" min="1" value="${item.qty||0}" style="width:80px;"></td>
            <td><input class="form-control be-price" type="number" step="0.01" value="${item.unitPrice||0}" style="width:100px;"></td>
          </tr>`;
        });
      } else {
        // 兼容旧数据（单产品）
        rows += `<tr data-id="${o.id}" data-idx="-1">
          <td style="font-size:12px;">${o.orderNo}</td>
          <td style="font-size:12px;">${o.productName||'-'}</td>
          <td><input class="form-control be-qty" type="number" min="1" value="${o.sendQty||0}" style="width:80px;"></td>
          <td><input class="form-control be-price" type="number" step="0.01" value="${o.unitPrice||0}" style="width:100px;"></td>
        </tr>`;
      }
    });
    openModal('批量编辑外协 - 数量/单价', `
      <div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px;">修改后点击保存，将更新所有选中外协单的数量和单价。</div>
      <table><thead><tr><th>单号</th><th>产品</th><th>数量</th><th>单价(元)</th></tr></thead>
      <tbody>${rows}</tbody></table>
    `, `<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveBatchEditOS()">保存</button>`);
  };

  // 保存批量编辑
  window.saveBatchEditOS = function() {
    const rows = qsa('#modalBody table tbody tr[data-id]');
    rows.forEach(row => {
      const id = row.dataset.id;
      const idx = Number(row.dataset.idx);
      const newQty = Number(row.querySelector('.be-qty').value) || 0;
      const newPrice = Number(row.querySelector('.be-price').value) || 0;
      const o = DB.find('outsource', id);
      if (!o) return;
      if (idx >= 0 && o.items && o.items[idx]) {
        // 新数据结构
        o.items[idx].qty = newQty;
        o.items[idx].unitPrice = newPrice;
        o.items[idx].subtotal = newQty * newPrice;
        o.totalAmount = o.items.reduce((s,i) => s + (i.subtotal||0), 0);
        o.totalQty = o.items.reduce((s,i) => s + (i.qty||0), 0);
      } else {
        // 兼容旧数据
        o.sendQty = newQty;
        o.unitPrice = newPrice;
        o.totalAmount = newQty * newPrice;
      }
      DB.update('outsource', id, o);
    });
    closeModal(); toast('批量编辑已保存'); render();
  };
  window.resetOsFilter = function() {
    const s = $('osSearch'); if(s) s.value = '';
    const f = $('osDateFrom'); if(f) f.value = '';
    const t = $('osDateTo'); if(t) t.value = '';
    filterOutsource();
  };

  window.openOutsourceForm = function(editId) {
    const prods = DB.get('products');
    const parts = DB.get('partners');
    const os = editId ? DB.find('outsource', editId) : null;
    const orderNo = os ? os.orderNo : ('OS' + today().replace(/-/g,'').slice(2) + String(outsource.length+1).padStart(3,'0'));
    openModal(os ? '编辑外协加工单' : '新增外协加工单', `
      <div class="form-row">
        <div class="form-group"><label>外协单号</label><input class="form-control" id="osNo" value="${orderNo}"></div>
        <div class="form-group"><label>日期</label><input class="form-control" id="osDate" type="date" value="${os?os.orderDate||today():today()}"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>协作方 <span class="required">*</span></label>
          <select class="form-control" id="osPartner">
            <option value="">请选择协作方</option>
            ${parts.map(p => `<option value="${p.name}" ${os&&os.partner===p.name?'selected':''}>${p.name}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label>预计收回日期</label><input class="form-control" id="osReturnDate" type="date" value="${os?os.returnDate||'':''}"></div>
      </div>
      <div class="form-group"><label>加工明细</label>
        <table id="osItems">
          <thead><tr><th>产品</th><th>库存</th><th>发出数量</th><th>加工单价(元)</th><th>小计(元)</th><th></th></tr></thead>
          <tbody id="osItemsBody"></tbody>
        </table>
        <button class="btn btn-sm btn-outline" style="margin-top:8px;" onclick="addOSItem()">+ 添加行</button>
      </div>
      <div id="osSummary"></div>
      <div class="form-group"><label>加工内容说明</label><input class="form-control" id="osDesc" placeholder="如：车削、热处理、电镀等" value="${os?os.processDesc||'':''}"></div>
      <div class="form-group"><label>备注</label><textarea class="form-control" id="osRemark" rows="2">${os?os.remark||'':''}</textarea></div>
    `, `<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveOutsource('${editId||''}')">保存</button>`);

    // 填充明细行
    if (os && os.items && os.items.length) {
      os.items.forEach(item => addOSItem(item));
      if ($('osRemark') && os.remark) $('osRemark').value = os.remark || '';
      calcOSTotal();
    } else {
      addOSItem();
    }
  };

  // 添加外协明细行
  window.addOSItem = function(prefill) {
    const prods = DB.get('products');
    const row = document.createElement('tr');
    row.innerHTML = `
      <td><select class="form-control os-prod">${prods.map(p => `<option value="${p.id}" data-price="${p.price||''}">${p.name} (${p.spec||''})</option>`).join('')}</select></td>
      <td class="os-stock" style="font-size:12px;">-</td>
      <td><input class="form-control os-qty" type="number" min="1" value="${prefill ? (prefill.qty||1) : 100}" oninput="calcOSItem(this)"></td>
      <td><input class="form-control os-price" type="number" step="0.01" value="${prefill ? (prefill.unitPrice||'') : ''}" oninput="calcOSItem(this)"></td>
      <td class="os-sub">¥0.00</td>
      <td><button class="btn btn-sm btn-danger" onclick="this.closest('tr').remove();calcOSTotal()">×</button>`;
    $('osItemsBody').appendChild(row);
    // 回填产品选择
    if (prefill && prefill.productId) {
      row.querySelector('.os-prod').value = prefill.productId;
      row.querySelector('.os-stock').innerHTML = getProductStockDetail(prefill.productId);
    }
    // 绑定产品选择事件
    row.querySelector('.os-prod').addEventListener('change', function(){
      const opt = this.options[this.selectedIndex];
      const pr = this.closest('tr');
      pr.querySelector('.os-stock').innerHTML = getProductStockDetail(this.value);
      if (!pr.querySelector('.os-price').value) {
        pr.querySelector('.os-price').value = opt.dataset.price || '';
      }
      calcOSItem(pr.querySelector('.os-qty'));
    });
    // 首次添加行时，自动显示当前选中产品的库存
    if (prefill && prefill.productId) {
      calcOSItem(row.querySelector('.os-qty'));
    } else {
      const firstProdId = row.querySelector('.os-prod').value;
      if (firstProdId) {
        row.querySelector('.os-stock').innerHTML = getProductStockDetail(firstProdId);
      }
    }
  };

  // 计算单行
  window.calcOSItem = function(el) {
    const row = el.closest('tr');
    const qty = Number(row.querySelector('.os-qty').value) || 0;
    const price = Number(row.querySelector('.os-price').value) || 0;
    row.querySelector('.os-sub').textContent = fmtMoney(qty * price);
    calcOSTotal();
  };

  // 计算合计
  window.calcOSTotal = function() {
    let totalAmount = 0, totalQty = 0;
    qsa('#osItemsBody tr').forEach(row => {
      const qty = Number(row.querySelector('.os-qty').value) || 0;
      const price = Number(row.querySelector('.os-price').value) || 0;
      totalAmount += qty * price;
      totalQty += qty;
    });
    const summaryEl = $('osSummary');
    if (summaryEl) {
      summaryEl.innerHTML = `
        <div class="form-row">
          <div class="form-group"><label>合计金额</label><input class="form-control" value="${fmtMoney(totalAmount)}" readonly style="font-weight:700;font-size:16px;color:var(--danger);"></div>
          <div class="form-group"><label>总数量</label><input class="form-control" value="${totalQty}" readonly></div>
        </div>`;
    }
  };

  window.saveOutsource = function(editId) {
    const partner = $('osPartner').value;
    const desc = ($('osDesc')||{}).value ? $('osDesc').value.trim() : '';
    if(!partner) return toast('请选择协作方','error');
    const items = [];
    let totalAmount = 0, totalQty = 0;
    qsa('#osItemsBody tr').forEach(row => {
      const prodId = row.querySelector('.os-prod').value;
      const qty = Number(row.querySelector('.os-qty').value) || 0;
      const price = Number(row.querySelector('.os-price').value) || 0;
      const product = DB.find('products', prodId);
      items.push({ productId: prodId, productName: product?product.name:'', qty, unitPrice: price, subtotal: qty * price });
      totalAmount += qty * price;
      totalQty += qty;
    });
    if(!items.length) return toast('请添加加工明细','error');
    const data = {
      orderNo: $('osNo').value.trim() || ('OS' + today().replace(/-/g,'').slice(2) + String(outsource.length+1).padStart(3,'0')),
      orderDate: $('osDate').value,
      partner,
      items, totalAmount, totalQty,
      processDesc: desc,
      returnDate: ($('osReturnDate')||{}).value || '',
      remark: ($('osRemark')||{}).value ? $('osRemark').value.trim() : '',
    };
    if(editId) {
      DB.update('outsource', editId, data);
      closeModal(); toast('外协单已更新'); render();
    } else {
      DB.add('outsource', { ...data, returnQty: 0, status: 'pending' });
      closeModal(); toast('外协单已创建'); render();
    }
  };

  window.sendOutsource = function(id) {
    const o = DB.find('outsource', id);
    const warehouses = DB.get('warehouses');
    const items = o.items || [];
    // 构建产品库存信息
    const itemStockRows = items.map(it => {
      const curStock = getProductStock(it.productId);
      return `<tr><td>${it.productName}</td><td>${it.qty}</td><td>${curStock > 0 ? '<span style="color:var(--success);">'+curStock+'</span>' : '<span style="color:var(--danger);">'+curStock+'</span>'}</td></tr>`;
    }).join('');
    openModal('发出加工 - ' + o.orderNo, `
      <table style="margin-bottom:12px;"><thead><tr><th>产品</th><th>发出数量</th><th>当前库存</th></tr></thead><tbody>${itemStockRows}</tbody></table>
      <div class="form-group"><label>从哪个仓库发出（统一仓库）</label>
        <select class="form-control" id="sendWh">
          ${warehouses.map(w => `<option value="${w.id}">${w.name}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label>发出备注</label><textarea class="form-control" id="sendRemark" rows="2"></textarea></div>
    `, `<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-warning" onclick="doSendOutsource('${id}')">确认发出</button>`);
  };

  window.doSendOutsource = function(id) {
    const o = DB.find('outsource', id);
    const whId = $('sendWh').value;
    const items = o.items || [];
    let shortQty = 0;
    items.forEach(it => {
      const whStock = DB.get('stock').find(s => s.productId === it.productId && s.warehouseId === whId);
      const available = whStock ? whStock.quantity : 0;
      if (available < it.qty) shortQty += (it.qty - available);
    });
    if(shortQty > 0) {
      showConfirm('库存不足', `部分产品库存不足（共缺 ${shortQty} 件），是否继续发出？`, () => {
        items.forEach(it => deductStock(it.productId, whId, it.qty, 'outsource_send', o.orderNo));
        DB.update('outsource', id, { status: 'processing', sendDate: new Date().toISOString(), sendWarehouseId: whId, sendRemark: ($('sendRemark')||{}).value ? $('sendRemark').value.trim() : '' });
        closeModal(); toast('已发出加工'); render();
      }, '⚠️');
      return;
    }
    items.forEach(it => deductStock(it.productId, whId, it.qty, 'outsource_send', o.orderNo));
    DB.update('outsource', id, { status: 'processing', sendDate: new Date().toISOString(), sendWarehouseId: whId, sendRemark: ($('sendRemark')||{}).value ? $('sendRemark').value.trim() : '' });
    closeModal(); toast('已发出加工'); render();
  };

  window.returnOutsource = function(id) {
    const o = DB.find('outsource', id);
    const items = o.items || [];
    // 收回时按每个产品分别填入收回数量
    const retRows = items.map((it, idx) => `<tr><td>${it.productName}</td><td>${it.qty}</td><td><input class="form-control ret-item-qty" type="number" data-idx="${idx}" value="${it.qty}" min="0" max="${it.qty}" style="width:80px;"></td></tr>`).join('');
    openModal('收回确认', `
      <table style="margin-bottom:12px;"><thead><tr><th>产品</th><th>发出数量</th><th>收回数量</th></tr></thead><tbody>${retRows}</tbody></table>
      <div class="form-group"><label>入库仓库</label>
        <select class="form-control" id="retWh">
          ${DB.get('warehouses').map(w => `<option value="${w.id}">${w.name}</option>`).join('')}
        </select>
      </div>
    `, `<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-warning" onclick="doReturn('${id}')">确认收回</button>`);
  };

  window.doReturn = function(id) {
    const o = DB.find('outsource', id);
    const whId = $('retWh').value;
    const items = o.items || [];
    let totalRet = 0;
    items.forEach((it, idx) => {
      const retQty = Number(qsa('.ret-item-qty')[idx]?.value) || 0;
      addStock(it.productId, whId, retQty, 0, 'outsource_return', o.orderNo);
      totalRet += retQty;
    });
    DB.update('outsource', id, { returnQty: totalRet, status: 'completed', returnDate: new Date().toISOString(), warehouseId: whId });
    closeModal(); toast('收回入库成功'); render();
  };

  window.viewOutsource = function(id) {
    const o = DB.find('outsource', id);
    const items = o.items || [];
    const itemRows = items.length > 0
      ? items.map(i => `<tr><td>${i.productName}</td><td>${i.qty}</td><td>${fmtMoney(i.unitPrice)}</td><td>${fmtMoney(i.subtotal)}</td></tr>`).join('')
      : `<tr><td>${o.productName||'-'}</td><td>${o.sendQty||'-'}</td><td>${fmtMoney(o.unitPrice)}</td><td>${fmtMoney(o.totalAmount)}</td></tr>`;
    openModal('外协详情 - ' + o.orderNo, `
      <div class="form-row" style="margin-bottom:12px;">
        <div><strong>协作方：</strong>${o.partner}</div>
        <div><strong>状态：</strong>${statusBadge(o.status)}</div>
      </div>
      <div class="form-row">
        <div><strong>加工内容：</strong>${o.processDesc||'-'}</div>
        <div><strong>日期：</strong>${fmtDate(o.orderDate)}</div>
      </div>
      <table style="margin-top:12px;"><thead><tr><th>产品</th><th>数量</th><th>单价(元)</th><th>小计</th></tr></thead><tbody>${itemRows}</tbody></table>
      <div class="form-row" style="margin-top:8px;">
        <div><strong>总数量：</strong>${o.totalQty||o.sendQty||'-'}</div>
        <div><strong>总费用：</strong><span style="color:var(--danger);font-weight:700;">${fmtMoney(o.totalAmount)}</span></div>
        <div><strong>收回数量：</strong>${o.returnQty||0}</div>
      </div>
      ${o.sendRemark ? `<div style="margin-top:8px;color:var(--text-secondary);">发出备注：${o.sendRemark}</div>` : ''}
      ${o.remark ? `<div style="margin-top:12px;color:var(--text-secondary);">备注：${o.remark}</div>` : ''}
    `, `<button class="btn btn-outline" onclick="closeModal()">关闭</button>`);
  };

  // 反审发出：恢复库存，退回待处理
  window.reverseOutsourceSend = function(id) {
    const o = DB.find('outsource', id);
    const whId = o.sendWarehouseId;
    if(!whId) return toast('无发出仓库记录','error');
    const items = o.items || [];
    const totalQty = items.length > 0 ? items.reduce((s,i)=>s+(i.qty||0),0) : (o.sendQty||0);
    showConfirm('反审发出确认',
      `将恢复发出数量（共 ${totalQty} 件）到库存，外协单退回为"待处理"状态。`,
      () => {
        if (items.length > 0) {
          items.forEach(it => addStock(it.productId, whId, it.qty, 0, 'outsource_send_reverse', o.orderNo));
        } else {
          addStock(o.productId, whId, o.sendQty, 0, 'outsource_send_reverse', o.orderNo);
        }
        DB.update('outsource', id, { status: 'pending', sendWarehouseId: null, sendDate: null, sendRemark: '' });
        toast('发出已反审，库存已恢复'); render();
      }, '↩️');
  };

  // 反审收回：回退成品入库
  window.reverseOutsourceReturn = function(id) {
    const o = DB.find('outsource', id);
    const qty = o.returnQty || 0;
    const whId = o.warehouseId;
    if(!qty || !whId) return toast('无收回记录','error');
    showConfirm('反审收回确认',
      `将回退收回入库数量 ${qty}，外协单退回为"加工中"状态。`,
      () => {
        // 收回时按发出时的产品明细比例回退
        const items = o.items || [];
        if (items.length > 0) {
          const totalSend = items.reduce((s,i)=>s+(i.qty||0),0);
          if (totalSend > 0) {
            items.forEach(it => {
              const ret = Math.round(qty * it.qty / totalSend);
              if (ret > 0) deductStock(it.productId, whId, ret, 'outsource_return_reverse', o.orderNo);
            });
          }
        } else {
          deductStock(o.productId, whId, qty, 'outsource_return_reverse', o.orderNo);
        }
        DB.update('outsource', id, { status: 'processing', returnQty: 0, returnDate: null, warehouseId: null });
        toast('收回已反审，库存已回退'); render();
      }, '↩️');
  };

  window.deleteOutsource = function(id) { showConfirm('删除外协单','此操作不可恢复', () => { DB.remove('outsource',id); toast('已删除'); render(); }, '🗑️'); };

  window.openPartnerForm = function() {
    const parts = DB.get('partners');
    openModal('协作方管理', `
      <div style="margin-bottom:16px;">
        <div class="form-row">
          <div class="form-group"><label>协作方名称</label><input class="form-control" id="partName"></div>
          <div class="form-group"><label>联系人</label><input class="form-control" id="partContact"></div>
          <div class="form-group"><label>电话</label><input class="form-control" id="partPhone"></div>
        </div>
        <div class="form-group"><label>加工能力</label><input class="form-control" id="partAbility" placeholder="如：车削、焊接、热处理"></div>
        <button class="btn btn-primary btn-sm" onclick="addPartner()">添加协作方</button>
      </div>
      <table><thead><tr><th>名称</th><th>联系人</th><th>电话</th><th>加工能力</th><th>操作</th></tr></thead>
      <tbody>${parts.map(p => `<tr>
        <td>${p.name}</td><td>${p.contact||'-'}</td><td>${p.phone||'-'}</td><td>${p.ability||'-'}</td>
        <td><button class="btn btn-sm btn-danger" onclick="removePart('${p.id}')">删除</button></td>
      </tr>`).join('')}</tbody></table>
    `, `<button class="btn btn-outline" onclick="closeModal()">关闭</button>`);
  };

  window.addPartner = function() {
    const name = $('partName').value.trim();
    if(!name) return toast('请输入名称','error');
    DB.add('partners', { name, contact:$('partContact').value.trim(), phone:$('partPhone').value.trim(), ability:$('partAbility').value.trim() });
    toast('已添加'); openPartnerForm();
  };
  window.removePart = function(id) { DB.remove('partners',id); toast('已删除'); openPartnerForm(); };

  render();
}

// ========== 库房管理 ==========
function renderWarehouse(el) {
  const warehouses = DB.get('warehouses');
  const stock = DB.get('stock');

  function render() {
    el.innerHTML = `
      <div class="toolbar">
        <h3 style="margin:0;">库房管理</h3>
        <button class="btn btn-primary" onclick="openWarehouseForm()">+ 新增库房</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:16px;">
        ${warehouses.map(w => {
          const whStock = stock.filter(s => s.warehouseId === w.id);
          const totalItems = whStock.length;
          const totalQty = whStock.reduce((s,i) => s + (i.quantity||0), 0);
          const totalValue = whStock.reduce((s,i) => s + (i.quantity||0) * (i.unitCost||0), 0);
          const typeMap = { material:'原料仓库', product:'成品仓库', semi:'半成品仓库' };
          const typeColor = { material:'info', product:'success', semi:'warning' };
          return `<div class="card">
            <div class="card-header">
              <h3>${w.name} <span class="badge badge-${typeColor[w.type]||'default'}">${typeMap[w.type]||w.type}</span></h3>
              <div class="btn-group">
                <button class="btn btn-sm btn-outline" onclick="renameWarehouse('${w.id}')">改名</button>
                <button class="btn btn-sm btn-outline" onclick="viewWarehouseStock('${w.id}')">库存明细</button>
                ${warehouses.length > 1 ? `<button class="btn btn-sm btn-danger" onclick="deleteWarehouse('${w.id}')">删除</button>` : ''}
              </div>
            </div>
            <p style="font-size:12px;color:var(--text-secondary);margin-bottom:12px;">${w.description||''}</p>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;text-align:center;">
              <div class="financial-item"><div class="label">物品种类</div><div class="value">${totalItems}</div></div>
              <div class="financial-item"><div class="label">总数量</div><div class="value">${totalQty}</div></div>
              <div class="financial-item"><div class="label">库存金额</div><div class="value" style="font-size:16px;">${fmtMoney(totalValue)}</div></div>
            </div>
          </div>`;
        }).join('')}
      </div>
    `;
  }

  window.openWarehouseForm = function() {
    openModal('新增库房', `
      <div class="form-group"><label>库房名称 <span class="required">*</span></label><input class="form-control" id="whName"></div>
      <div class="form-group"><label>库房类型</label>
        <select class="form-control" id="whType">
          <option value="material">原料仓库</option>
          <option value="product">成品仓库</option>
          <option value="semi">半成品仓库</option>
        </select>
      </div>
      <div class="form-group"><label>描述</label><input class="form-control" id="whDesc"></div>
    `, `<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveWarehouse()">保存</button>`);
  };

  window.saveWarehouse = function() {
    const name = $('whName').value.trim();
    if(!name) return toast('请输入库房名称','error');
    DB.add('warehouses', { name, type: $('whType').value, description: $('whDesc').value.trim() });
    closeModal(); toast('库房已添加'); render();
  };

  window.renameWarehouse = function(id) {
    const w = DB.find('warehouses', id);
    openModal('修改库房名称', `
      <div class="form-group"><label>库房名称</label><input class="form-control" id="whNewName" value="${w.name}"></div>
      <div class="form-group"><label>描述</label><input class="form-control" id="whNewDesc" value="${w.description||''}"></div>
    `, `<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="doRename('${id}')">保存</button>`);
  };

  window.doRename = function(id) {
    const newName = $('whNewName').value.trim();
    if(!newName) return toast('名称不能为空','error');
    DB.update('warehouses', id, { name: newName, description: $('whNewDesc').value.trim() });
    // 同步更新库存表中的仓库名
    const stock = DB.get('stock');
    stock.forEach(s => { if(s.warehouseId === id) s.warehouseName = newName; });
    DB.set('stock', stock);
    closeModal(); toast('库房已更新'); render();
  };

  window.deleteWarehouse = function(id) {
    const whStock = stock.filter(s => s.warehouseId === id);
    if(whStock.length > 0) return toast('该库房仍有库存，无法删除','error');
    showConfirm('删除库房','确定删除此库房？', () => { DB.remove('warehouses',id); toast('已删除'); render(); }, '🗑️');
  };

  window.viewWarehouseStock = function(id) {
    const w = DB.find('warehouses', id);
    const whStock = stock.filter(s => s.warehouseId === id);
    openModal(w.name + ' - 库存明细', `
      <table><thead><tr><th>产品名称</th><th>数量</th><th>单位成本</th><th>库存金额</th><th>预警值</th><th>操作</th></tr></thead>
      <tbody id="whStockBody">${whStock.length ? whStock.map(s => `<tr data-stock-id="${s.id}" data-pid="${s.productId}">
        <td>${s.productName}</td>
        <td><input class="form-control ws-qty" type="number" style="width:80px;" value="${s.quantity}" onchange="calcStockRow(this)"></td>
        <td><input class="form-control ws-cost" type="number" step="0.01" style="width:100px;" value="${(s.unitCost||0).toFixed(2)}" onchange="calcStockRow(this)"></td>
        <td class="ws-amount">${fmtMoney(s.quantity * s.unitCost)}</td>
        <td><input class="form-control ws-warn" type="number" style="width:70px;" value="${s.warningLevel||10}"></td>
        <td>
          <div class="table-actions">
            <button class="btn btn-sm btn-primary" onclick="saveStockRow(this, '${id}')">保存</button>
            <button class="btn btn-sm btn-outline" onclick="closeModal();viewProductStockFlow('${s.productId}','${s.productName}')">流水</button>
          </div>
        </td>
      </tr>`).join('') : '<tr><td colspan="6"><div class="empty-state"><p>暂无库存</p></div></td></tr>'}</tbody></table>
      <button class="btn btn-sm btn-outline" style="margin-top:8px;" onclick="addNewStockProduct('${id}','${w.name}')">+ 添加产品</button>
    `, `<button class="btn btn-outline" onclick="closeModal()">关闭</button>`);
  };

  // 数量或成本变化时实时更新库存金额
  window.calcStockRow = function(el) {
    const row = el.closest('tr');
    const qty = Number(row.querySelector('.ws-qty').value) || 0;
    const cost = Number(row.querySelector('.ws-cost').value) || 0;
    row.querySelector('.ws-amount').textContent = fmtMoney(qty * cost);
  };

  // 添加新产品到仓库
  window.addNewStockProduct = function(warehouseId, warehouseName) {
    const allStock = DB.get('stock');
    const whStock = allStock.filter(s => s.warehouseId === warehouseId);
    const existIds = new Set(whStock.map(s => s.productId));
    const prods = DB.get('products').filter(p => !existIds.has(p.id));
    if (!prods.length) return toast('所有产品均已在此仓库中','error');
    openModal('添加产品到仓库', `
      <div class="form-group"><label>选择产品 <span class="required">*</span></label>
        <select class="form-control" id="newStockProd">
          <option value="">请选择产品</option>
          ${prods.map(p => `<option value="${p.id}">${p.name} (${p.spec||''})</option>`).join('')}
        </select>
      </div>
      <div class="form-row">
        <div class="form-group"><label>初始数量</label><input class="form-control" id="newStockQty" type="number" min="0" value="0"></div>
        <div class="form-group"><label>单位成本</label><input class="form-control" id="newStockCost" type="number" step="0.01" value="0"></div>
      </div>
    `, `<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="doAddNewStockProduct('${warehouseId}','${warehouseName}')">添加</button>`);
  };

  window.doAddNewStockProduct = function(warehouseId, warehouseName) {
    const productId = $('newStockProd').value;
    const qty = Number($('newStockQty').value) || 0;
    const unitCost = Number($('newStockCost').value) || 0;
    if (!productId) return toast('请选择产品','error');
    const product = DB.find('products', productId);
    const allStock = DB.get('stock');
    // 创建新库存记录
    DB.add('stock', {
      productId, productName: product ? product.name : '',
      warehouseId, warehouseName,
      quantity: qty, unitCost, warningLevel: 10,
      createdAt: new Date().toISOString()
    });
    // 如果数量>0，记录入库流水
    if (qty > 0) {
      const flow = DB.get('stockFlow') || [];
      flow.push({
        id: 'F' + Date.now() + String(Math.random()).slice(2,6),
        date: new Date().toISOString(),
        type: 'in', productId, productName: product ? product.name : '',
        warehouseId, warehouseName,
        quantity: qty, unitCost, amount: qty * unitCost,
        sourceType: 'manual_adjust', sourceNo: '手动添加'
      });
      DB.set('stockFlow', flow);
    }
    closeModal(); toast('产品已添加');
    viewWarehouseStock(warehouseId);
    render();
  };

  // 保存单行库存修改
  window.saveStockRow = function(btn, warehouseId) {
    const row = btn.closest('tr');
    const stockId = row.dataset.stockId;
    const qty = Number(row.querySelector('.ws-qty').value) || 0;
    const unitCost = Number(row.querySelector('.ws-cost').value) || 0;
    const warningLevel = Number(row.querySelector('.ws-warn').value) || 10;
    const allStock = DB.get('stock');
    const item = allStock.find(s => s.id === stockId);
    if (!item) return toast('库存记录未找到', 'error');
    // 记录调整流水
    const oldQty = item.quantity || 0;
    const oldCost = item.unitCost || 0;
    item.quantity = qty;
    item.unitCost = unitCost;
    item.warningLevel = warningLevel;
    item.updatedAt = new Date().toISOString();
    DB.set('stock', allStock);
    // 如果数量有变化，记录流水
    if (qty !== oldQty) {
      const diff = qty - oldQty;
      const flow = DB.get('stockFlow') || [];
      flow.push({
        id: 'F' + Date.now() + String(Math.random()).slice(2,6),
        date: new Date().toISOString(),
        type: diff > 0 ? 'in' : 'out',
        productId: item.productId, productName: item.productName,
        warehouseId: warehouseId, warehouseName: DB.find('warehouses', warehouseId)?.name || '',
        quantity: Math.abs(diff), unitCost: unitCost,
        amount: Math.abs(diff) * unitCost,
        sourceType: 'manual_adjust', sourceNo: '手动调整'
      });
      DB.set('stockFlow', flow);
    }
    toast('库存已更新'); render();
    // 刷新弹窗
    closeModal();
    viewWarehouseStock(warehouseId);
  };

  window.viewProductStockFlow = function(productId, productName) {
    const allFlow = DB.get('stockFlow') || [];
    const flows = allFlow.filter(f => f.productId === productId).sort((a,b) => new Date(b.date) - new Date(a.date));
    const typeLabel = { purchase:'采购入库', purchase_reverse:'采购反审', production:'生产领料', production_reverse:'生产反审', outsource_send:'外协发出', outsource_send_reverse:'外协发出反审', outsource_return:'外协收回', outsource_return_reverse:'外协收回反审', production_complete:'完工入库', sale:'销售发货', sale_reverse:'销售反审', manual_adjust:'手动调整' };
    let sumIn=0, sumOut=0;
    const rows = flows.slice(0, 100).map(f => {
      if(f.type==='in') sumIn += f.amount; else sumOut += f.amount;
      return `<tr>
        <td>${fmtDate(f.date)}</td>
        <td><span class="badge ${f.type==='in'?'badge-success':'badge-danger'}">${f.type==='in'?'入库':'出库'}</span></td>
        <td>${f.warehouseName||'-'}</td>
        <td>${f.quantity}</td>
        <td>${fmtMoney(f.unitCost)}</td>
        <td style="color:${f.type==='in'?'var(--success)':'var(--danger)'};">${fmtMoney(f.amount)}</td>
        <td>${typeLabel[f.sourceType]||f.sourceType||'-'}</td>
        <td>${f.sourceNo||'-'}</td>
      </tr>`;
    }).join('');
    openModal(productName + ' - 全部出入库流水', `
      <div style="margin-bottom:12px;display:flex;gap:20px;font-size:13px;">
        <span>总入库：<strong style="color:var(--success);">${fmtMoney(sumIn)}</strong></span>
        <span>总出库：<strong style="color:var(--danger);">${fmtMoney(sumOut)}</strong></span>
        <span>净变动：<strong style="color:${sumIn-sumOut>=0?'var(--success)':'var(--danger)'};">${(sumIn-sumOut)>=0?'+':''}${fmtMoney(sumIn-sumOut)}</strong></span>
        ${flows.length > 100 ? '<span style="color:var(--text-light);">（仅显示最近100条）</span>' : ''}
      </div>
      <div class="table-wrapper" style="max-height:450px;overflow-y:auto;">
        <table>
          <thead style="position:sticky;top:0;background:var(--bg-white);z-index:1;">
            <tr><th>时间</th><th>类型</th><th>仓库</th><th>数量</th><th>单价</th><th>金额</th><th>来源</th><th>单号</th></tr>
          </thead>
          <tbody>${rows || '<tr><td colspan="8"><div class="empty-state"><p>暂无流水记录</p></div></td></tr>'}</tbody>
        </table>
      </div>
    `, `<button class="btn btn-outline" onclick="closeModal()">关闭</button>`, '900px');
  };

  render();
}

// ========== 财务报表 ==========
function renderFinance(el) {
  const now = new Date();
  const currentMonth = now.toISOString().slice(0,7); // YYYY-MM

  function render() {
    el.innerHTML = `
      <div class="report-period">
        <label>选择月份：</label>
        <input type="month" class="form-control" style="width:180px;" id="finMonth" value="${currentMonth}">
        <button class="btn btn-primary" onclick="refreshFinance()">查看报表</button>
        <button class="btn btn-outline" onclick="printFinance()">🖨️ 打印</button>
      </div>
      <div id="financeContent"></div>
    `;
    refreshFinance();
  }

  window.refreshFinance = function() {
    const month = $('finMonth').value;
    const [year, monthNum] = month.split('-').map(Number);
    const startDate = new Date(year, monthNum-1, 1);
    const endDate = new Date(year, monthNum, 0, 23, 59, 59);

    // 筛选当月数据
    const monthPurchases = DB.get('purchases').filter(p => { const d = new Date(p.orderDate||p.createdAt); return d >= startDate && d <= endDate; });
    const monthSales = DB.get('sales').filter(s => { const d = new Date(s.orderDate||s.createdAt); return d >= startDate && d <= endDate; });
    const monthOutsource = DB.get('outsource').filter(o => { const d = new Date(o.orderDate||o.createdAt); return d >= startDate && d <= endDate; });

    const totalSales = monthSales.reduce((s,o) => s + (Number(o.totalAmount)||0), 0);
    const totalPurchase = monthPurchases.reduce((s,o) => s + (Number(o.totalAmount)||0), 0);
    const totalOutsource = monthOutsource.reduce((s,o) => s + (Number(o.totalAmount)||0), 0);
    const totalCost = totalPurchase + totalOutsource;
    const grossProfit = totalSales - totalCost;
    const grossRate = totalSales > 0 ? (grossProfit / totalSales * 100).toFixed(1) : 0;

    // 销售成本（通过库存加权平均计算）
    const stock = DB.get('stock');
    let totalStockValue = stock.reduce((s,i) => s + (i.quantity||0) * (i.unitCost||0), 0);

    // 收款统计
    const monthTotalPaid = monthSales.reduce((s,o) => s + (o.payments||[]).reduce((ps,p) => ps + (Number(p.amount)||0), 0), 0);
    const monthUnpaid = totalSales - monthTotalPaid;
    const monthPrepaid = monthSales.reduce((s,o) => {
      return s + (o.payments||[]).filter(p => p.remark && p.remark.includes('预付')).reduce((ps,p) => ps + (Number(p.amount)||0), 0);
    }, 0);

    // 按产品统计销售
    const salesByProduct = {};
    monthSales.forEach(so => {
      so.items.forEach(item => {
        if(!salesByProduct[item.productName]) salesByProduct[item.productName] = { qty:0, amount:0 };
        salesByProduct[item.productName].qty += item.qty;
        salesByProduct[item.productName].amount += item.subtotal;
      });
    });

    // 按客户统计销售
    const salesByCustomer = {};
    monthSales.forEach(so => {
      if(!salesByCustomer[so.customer]) salesByCustomer[so.customer] = 0;
      salesByCustomer[so.customer] += Number(so.totalAmount)||0;
    });

    // 按供应商统计采购
    const purchaseBySupplier = {};
    monthPurchases.forEach(po => {
      if(!purchaseBySupplier[po.supplier]) purchaseBySupplier[po.supplier] = 0;
      purchaseBySupplier[po.supplier] += Number(po.totalAmount)||0;
    });

    // 利润瀑布图
    const waterfallData = [
      { label: '销售收入', value: totalSales, color: 'var(--success)' },
      { label: '采购成本', value: -totalPurchase, color: 'var(--danger)' },
      { label: '外协费用', value: -totalOutsource, color: 'var(--warning)' },
      { label: '毛利润', value: grossProfit, color: grossProfit >= 0 ? 'var(--success)' : 'var(--danger)' }
    ];

    $('financeContent').innerHTML = `
      <div class="card">
        <div class="card-header"><h3>📊 ${year}年${monthNum}月 利润报表</h3></div>
        <div class="financial-summary">
          <div class="financial-item"><div class="label">销售收入</div><div class="value positive">${fmtMoney(totalSales)}</div></div>
          <div class="financial-item"><div class="label">采购成本</div><div class="value negative">${fmtMoney(totalPurchase)}</div></div>
          <div class="financial-item"><div class="label">外协费用</div><div class="value negative">${fmtMoney(totalOutsource)}</div></div>
          <div class="financial-item"><div class="label">总成本</div><div class="value negative">${fmtMoney(totalCost)}</div></div>
          <div class="financial-item" style="background:${grossProfit>=0?'var(--success-light)':'var(--danger-light)'};">
            <div class="label">毛利润</div>
            <div class="value ${grossProfit>=0?'positive':'negative'}" style="font-size:26px;">${fmtMoney(grossProfit)}</div>
          </div>
          <div class="financial-item"><div class="label">毛利率</div><div class="value" style="color:${grossRate>=0?'var(--success)':'var(--danger)'};">${grossRate}%</div></div>
        </div>
      </div>

      <!-- 利润瀑布图 -->
      <div class="chart-container">
        <h4 style="margin-bottom:16px;">利润构成分析</h4>
        <div class="waterfall-bar">
          ${waterfallData.map(d => {
            const absVal = Math.abs(d.value);
            const maxVal = Math.max(...waterfallData.map(x => Math.abs(x.value)), 1);
            const height = Math.max(4, (absVal / maxVal) * 160);
            return `<div class="waterfall-item">
              <div class="bar-value" style="color:${d.color};">${d.value>=0?'+':''}${fmtMoney(d.value)}</div>
              <div class="bar" style="height:${height}px;background:${d.color};"></div>
              <div class="bar-label">${d.label}</div>
            </div>`;
          }).join('')}
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
        <!-- 产品销售排行 -->
        <div class="card">
          <div class="card-header"><h3>🏆 产品销售排行</h3></div>
          ${Object.keys(salesByProduct).length ? `<table>
            <thead><tr><th>产品</th><th>数量</th><th>金额</th></tr></thead>
            <tbody>${Object.entries(salesByProduct).sort((a,b)=>b[1].amount-a[1].amount).map(([name,data]) => `<tr>
              <td>${name}</td><td>${data.qty}</td><td>${fmtMoney(data.amount)}</td>
            </tr>`).join('')}</tbody>
          </table>` : '<div class="empty-state"><p>暂无数据</p></div>'}
        </div>

        <!-- 客户销售统计 -->
        <div class="card">
          <div class="card-header"><h3>👥 客户销售统计</h3></div>
          ${Object.keys(salesByCustomer).length ? `<table>
            <thead><tr><th>客户</th><th>销售金额</th><th>占比</th></tr></thead>
            <tbody>${Object.entries(salesByCustomer).sort((a,b)=>b[1]-a[1]).map(([name,amount]) => `<tr>
              <td>${name}</td><td>${fmtMoney(amount)}</td>
              <td>
                <div class="progress-bar" style="width:100px;display:inline-block;vertical-align:middle;">
                  <div class="progress-fill" style="width:${(amount/totalSales*100).toFixed(0)}%;background:var(--primary);"></div>
                </div>
                <span style="font-size:12px;margin-left:4px;">${(amount/totalSales*100).toFixed(1)}%</span>
              </td>
            </tr>`).join('')}</tbody>
          </table>` : '<div class="empty-state"><p>暂无数据</p></div>'}
        </div>
      </div>

      <!-- 供应商采购统计 -->
      <div class="card">
        <div class="card-header"><h3>🏭 供应商采购统计</h3></div>
        ${Object.keys(purchaseBySupplier).length ? `<table>
          <thead><tr><th>供应商</th><th>采购金额</th><th>占比</th></tr></thead>
          <tbody>${Object.entries(purchaseBySupplier).sort((a,b)=>b[1]-a[1]).map(([name,amount]) => `<tr>
            <td>${name}</td><td>${fmtMoney(amount)}</td>
            <td>
              <div class="progress-bar" style="width:100px;display:inline-block;vertical-align:middle;">
                <div class="progress-fill" style="width:${(amount/totalPurchase*100).toFixed(0)}%;background:var(--warning);"></div>
              </div>
              <span style="font-size:12px;margin-left:4px;">${totalPurchase > 0 ? (amount/totalPurchase*100).toFixed(1) : 0}%</span>
            </td>
          </tr>`).join('')}</tbody>
        </table>` : '<div class="empty-state"><p>暂无数据</p></div>'}
      </div>

      <!-- 原料仓库出入库核算 -->
      <div class="card">
        <div class="card-header"><h3>📦 原料仓库出入库核算</h3></div>
        ${(() => {
          const allFlow = DB.get('stockFlow') || [];
          // 筛选当月流水
          const monthFlow = allFlow.filter(f => f.date && f.date.slice(0,7) === month);
          // 筛选原料仓库的流水
          const materialWhIds = DB.get('warehouses').filter(w => w.type === 'material').map(w => w.id);
          const matFlow = materialWhIds.length > 0
            ? monthFlow.filter(f => materialWhIds.includes(f.warehouseId))
            : monthFlow; // 如果没有标记类型的仓库，显示全部
          // 按产品汇总
          const byProduct = {};
          matFlow.forEach(f => {
            const key = f.productId;
            if(!byProduct[key]) byProduct[key] = { productName: f.productName, inQty:0, inAmount:0, outQty:0, outAmount:0, flows:[] };
            byProduct[key].flows.push(f);
            if(f.type === 'in') { byProduct[key].inQty += f.quantity; byProduct[key].inAmount += f.amount; }
            else { byProduct[key].outQty += f.quantity; byProduct[key].outAmount += f.amount; }
          });
          // 计算合计
          let sumInQty=0, sumInAmount=0, sumOutQty=0, sumOutAmount=0;
          Object.values(byProduct).forEach(p => { sumInQty+=p.inQty; sumInAmount+=p.inAmount; sumOutQty+=p.outQty; sumOutAmount+=p.outAmount; });
          // 采购入库合计（按采购单匹配）
          const purchaseInFlow = matFlow.filter(f => f.sourceType === 'purchase');
          const purchaseInAmount = purchaseInFlow.reduce((s,f) => s + f.amount, 0);
          // 当月采购入库的库存变动 = 入库 - 出库（对应本月采购部分）
          if(!matFlow.length && !purchaseInFlow.length) return '<div class="empty-state"><p>本月暂无原料仓库出入库记录</p></div>';
          const typeLabel = { purchase:'采购入库', purchase_reverse:'采购反审', production:'生产领料', production_reverse:'生产反审', outsource_send:'外协发出', outsource_send_reverse:'外协发出反审', outsource_return:'外协收回', outsource_return_reverse:'外协收回反审', production_complete:'完工入库', sale:'销售发货', sale_reverse:'销售反审', manual_adjust:'手动调整' };
          return `
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;">
              <div class="financial-item"><div class="label">采购入库金额</div><div class="value" style="color:var(--success);">${fmtMoney(purchaseInAmount)}</div></div>
              <div class="financial-item"><div class="label">入库总计</div><div class="value">${sumInQty} 件 / ${fmtMoney(sumInAmount)}</div></div>
              <div class="financial-item"><div class="label">出库总计</div><div class="value">${sumOutQty} 件 / ${fmtMoney(sumOutAmount)}</div></div>
              <div class="financial-item"><div class="label">净变动</div><div class="value" style="color:${sumInAmount-sumOutAmount>=0?'var(--success)':'var(--danger)'};">${(sumInQty-sumOutQty)>=0?'+':''}${sumInQty-sumOutQty} 件 / ${(sumInAmount-sumOutAmount)>=0?'+':''}${fmtMoney(sumInAmount-sumOutAmount)}</div></div>
            </div>
            <div class="table-wrapper" style="max-height:500px;overflow-y:auto;">
              <table>
                <thead style="position:sticky;top:0;background:var(--bg-white);z-index:1;">
                  <tr><th>产品</th><th>入库数量</th><th>入库金额</th><th>出库数量</th><th>出库金额</th><th>净变动</th><th>明细</th></tr>
                </thead>
                <tbody>
                  ${Object.values(byProduct).sort((a,b) => (b.inAmount+b.outAmount)-(a.inAmount+a.outAmount)).map(p => {
                    const netQty = p.inQty - p.outQty;
                    const netAmount = p.inAmount - p.outAmount;
                    return `<tr>
                      <td><strong>${p.productName}</strong></td>
                      <td style="color:var(--success);">${p.inQty}</td>
                      <td style="color:var(--success);">${fmtMoney(p.inAmount)}</td>
                      <td style="color:var(--danger);">${p.outQty}</td>
                      <td style="color:var(--danger);">${fmtMoney(p.outAmount)}</td>
                      <td style="color:${netAmount>=0?'var(--success)':'var(--danger)'};font-weight:600;">${netQty>=0?'+':''}${netQty} / ${netAmount>=0?'+':''}${fmtMoney(netAmount)}</td>
                      <td><button class="btn btn-sm btn-outline" onclick="showStockFlowDetail('${p.productName}','${month}')">流水</button></td>
                    </tr>`;
                  }).join('')}
                </tbody>
                <tfoot style="position:sticky;bottom:0;background:var(--bg-white);z-index:1;">
                  <tr style="font-weight:700;border-top:2px solid var(--border);">
                    <td>合计</td>
                    <td style="color:var(--success);">${sumInQty}</td>
                    <td style="color:var(--success);">${fmtMoney(sumInAmount)}</td>
                    <td style="color:var(--danger);">${sumOutQty}</td>
                    <td style="color:var(--danger);">${fmtMoney(sumOutAmount)}</td>
                    <td style="color:${sumInAmount-sumOutAmount>=0?'var(--success)':'var(--danger)'};">${(sumInQty-sumOutQty)>=0?'+':''}${sumInQty-sumOutQty} / ${(sumInAmount-sumOutAmount)>=0?'+':''}${fmtMoney(sumInAmount-sumOutAmount)}</td>
                    <td></td>
                  </tr>
                </tfoot>
              </table>
            </div>
            <div style="margin-top:8px;font-size:11px;color:var(--text-light);">
              💡 本表统计原料仓库的当月出入库情况，采购入库金额与库存增加金额可核对是否一致。出库按当前加权平均成本计算金额。
            </div>
          `;
        })()}
      </div>

      <!-- 资产负债概览 -->
      <div class="card">
        <div class="card-header"><h3>🏦 资产概览</h3></div>
        <div class="financial-summary">
          <div class="financial-item"><div class="label">库存总价值</div><div class="value">${fmtMoney(totalStockValue)}</div></div>
          <div class="financial-item"><div class="label">本月销售总额</div><div class="value positive">${fmtMoney(totalSales)}</div></div>
          <div class="financial-item"><div class="label">本月已收款项</div><div class="value positive">${fmtMoney(monthTotalPaid)}</div></div>
          <div class="financial-item"><div class="label">本月未收款项</div><div class="value ${monthUnpaid>0?'negative':'positive'}">${fmtMoney(monthUnpaid)}</div></div>
          <div class="financial-item"><div class="label">其中预付款</div><div class="value">${fmtMoney(monthPrepaid)}</div></div>
          <div class="financial-item"><div class="label">本月应付（采购+外协）</div><div class="value negative">${fmtMoney(totalCost)}</div></div>
        </div>
      </div>

      <!-- 收款明细 -->
      <div class="card">
        <div class="card-header"><h3>💳 本月收款明细</h3></div>
        ${(() => {
          const allPayments = [];
          monthSales.forEach(so => {
            (so.payments||[]).forEach(p => {
              allPayments.push({ orderNo: so.orderNo, customer: so.customer, ...p });
            });
          });
          if(!allPayments.length) return '<div class="empty-state"><p>暂无收款记录</p></div>';
          return `<table>
            <thead><tr><th>销售单号</th><th>客户</th><th>收款日期</th><th>金额</th><th>方式</th><th>备注</th></tr></thead>
            <tbody>${allPayments.sort((a,b) => new Date(b.createdAt||b.date) - new Date(a.createdAt||a.date)).map(p => `<tr>
              <td>${p.orderNo}</td><td>${p.customer}</td><td>${fmtDate(p.date)}</td>
              <td style="color:var(--success);font-weight:600;">${fmtMoney(p.amount)}</td>
              <td>${p.method||'-'}</td><td>${p.remark||'-'}</td>
            </tr>`).join('')}</tbody></table>`;
        })()}
      </div>

      <!-- 每笔销售毛利润明细 -->
      <div class="card">
        <div class="card-header"><h3>📈 本月每笔销售毛利润</h3></div>
        ${(() => {
          const profitRows = [];
          let sumRevenue = 0, sumCost = 0;
          monthSales.forEach(so => {
            if(!so.items || !so.items.length) return;
            const hasCostRecords = so.costRecords && so.costRecords.length > 0;
            let saleTotal = 0, costTotal = 0;
            const details = [];
            so.items.forEach(item => {
              saleTotal += item.subtotal || (item.qty * item.price);
              let itemCost = 0, itemUnitCost = 0;
              if(hasCostRecords) {
                const cr = so.costRecords.find(c => c.productId === item.productId);
                if(cr) { itemCost = cr.totalCost; itemUnitCost = cr.unitCost; }
              } else {
                // 未发货或旧数据，用当前库存成本估算
                const stk = DB.get('stock').find(s => s.productId === item.productId);
                itemUnitCost = stk ? (stk.unitCost || 0) : 0;
                itemCost = item.qty * itemUnitCost;
              }
              costTotal += itemCost;
              const itemProfit = (item.subtotal || (item.qty * item.price)) - itemCost;
              details.push({ name: item.productName, qty: item.qty, salePrice: item.price, unitCost: itemUnitCost, subtotal: item.subtotal || item.qty*item.price, totalCost: itemCost, profit: itemProfit });
            });
            const profit = saleTotal - costTotal;
            const rate = saleTotal > 0 ? (profit / saleTotal * 100).toFixed(1) : 0;
            sumRevenue += saleTotal;
            sumCost += costTotal;
            profitRows.push({ orderNo: so.orderNo, customer: so.customer, orderDate: so.orderDate, saleTotal, costTotal, profit, rate, details, hasCostRecords, status: so.status });
          });
          profitRows.sort((a,b) => new Date(b.orderDate||0) - new Date(a.orderDate||0));
          const totalProfit = sumRevenue - sumCost;
          const totalRate = sumRevenue > 0 ? (totalProfit / sumRevenue * 100).toFixed(1) : 0;
          if(!profitRows.length) return '<div class="empty-state"><p>暂无销售数据</p></div>';
          return `
            <div class="table-wrapper" style="max-height:600px;overflow-y:auto;">
              <table>
                <thead style="position:sticky;top:0;background:var(--bg-white);z-index:1;">
                  <tr>
                    <th>销售单号</th><th>日期</th><th>客户</th><th>销售收入</th><th>销售成本</th>
                    <th style="color:${totalProfit>=0?'var(--success)':'var(--danger)'};">毛利润</th>
                    <th>毛利率</th><th>成本来源</th><th>操作</th>
                  </tr>
                </thead>
                <tbody>
                  ${profitRows.map(row => `<tr>
                    <td><strong>${row.orderNo}</strong></td>
                    <td>${fmtDate(row.orderDate)}</td>
                    <td>${row.customer}</td>
                    <td style="color:var(--success);font-weight:600;">${fmtMoney(row.saleTotal)}</td>
                    <td style="color:var(--danger);">${fmtMoney(row.costTotal)}</td>
                    <td style="color:${row.profit>=0?'var(--success)':'var(--danger)'};font-weight:700;font-size:14px;">${row.profit>=0?'+':''}${fmtMoney(row.profit)}</td>
                    <td><span style="color:${Number(row.rate)>=0?'var(--success)':'var(--danger)'};">${row.rate}%</span></td>
                    <td><span class="badge ${row.hasCostRecords?'badge-success':'badge-warning'}" title="${row.hasCostRecords?'发货时记录的实际成本':'用当前库存成本估算（仅供参考）'}">${row.hasCostRecords?'实际成本':'估算'}</span></td>
                    <td><button class="btn btn-sm btn-outline" onclick="showSaleProfitDetail('${row.orderNo}')">明细</button></td>
                  </tr>`).join('')}
                </tbody>
                <tfoot style="position:sticky;bottom:0;background:var(--bg-white);z-index:1;">
                  <tr style="font-weight:700;font-size:14px;border-top:2px solid var(--border);">
                    <td colspan="3">合计</td>
                    <td style="color:var(--success);">${fmtMoney(sumRevenue)}</td>
                    <td style="color:var(--danger);">${fmtMoney(sumCost)}</td>
                    <td style="color:${totalProfit>=0?'var(--success)':'var(--danger)'};font-size:16px;">${totalProfit>=0?'+':''}${fmtMoney(totalProfit)}</td>
                    <td><span style="color:${Number(totalRate)>=0?'var(--success)':'var(--danger)'};">${totalRate}%</span></td>
                    <td colspan="2"></td>
                  </tr>
                </tfoot>
              </table>
            </div>
            <div style="margin-top:8px;font-size:11px;color:var(--text-light);">
              💡 "实际成本" = 发货时记录的库存成本价 × 数量（准确）；"估算" = 当前库存成本价 × 数量（仅供参考，成本可能已变化）
            </div>
          `;
        })()}
      </div>
    `;
  };

  window.showSaleProfitDetail = function(orderNo) {
    const so = DB.get('sales').find(s => s.orderNo === orderNo);
    if(!so) return;
    const hasCostRecords = so.costRecords && so.costRecords.length > 0;
    const detailRows = so.items.map(item => {
      let unitCost = 0, totalCost = 0;
      if(hasCostRecords) {
        const cr = so.costRecords.find(c => c.productId === item.productId);
        if(cr) { unitCost = cr.unitCost; totalCost = cr.totalCost; }
      } else {
        const stk = DB.get('stock').find(s => s.productId === item.productId);
        unitCost = stk ? (stk.unitCost || 0) : 0;
        totalCost = item.qty * unitCost;
      }
      const subtotal = item.subtotal || item.qty * item.price;
      const profit = subtotal - totalCost;
      const rate = subtotal > 0 ? (profit / subtotal * 100).toFixed(1) : '0.0';
      return `<tr>
        <td>${item.productName}</td>
        <td>${item.qty}</td>
        <td>${fmtMoney(item.price)}</td>
        <td style="font-weight:600;color:var(--success);">${fmtMoney(subtotal)}</td>
        <td style="color:var(--danger);">${fmtMoney(unitCost)}</td>
        <td style="color:var(--danger);">${fmtMoney(totalCost)}</td>
        <td style="color:${profit>=0?'var(--success)':'var(--danger)'};font-weight:700;">${profit>=0?'+':''}${fmtMoney(profit)}</td>
        <td><span style="color:${Number(rate)>=0?'var(--success)':'var(--danger)'};">${rate}%</span></td>
      </tr>`;
    });
    const totalSale = so.items.reduce((s,i) => s + (i.subtotal || i.qty*i.price), 0);
    const totalCost = so.items.reduce((s,i) => {
      if(hasCostRecords) {
        const cr = so.costRecords.find(c => c.productId === i.productId);
        return s + (cr ? cr.totalCost : 0);
      }
      const stk = DB.get('stock').find(st => st.productId === i.productId);
      return s + i.qty * (stk ? stk.unitCost || 0 : 0);
    }, 0);
    const totalProfit = totalSale - totalCost;
    const totalRate = totalSale > 0 ? (totalProfit / totalSale * 100).toFixed(1) : '0.0';
    openModal('毛利润明细 - ' + orderNo, `
      <div style="margin-bottom:12px;font-size:13px;color:var(--text-secondary);">
        客户：${so.customer} &nbsp;|&nbsp; 日期：${fmtDate(so.orderDate)} &nbsp;|&nbsp; 成本来源：<span class="badge ${hasCostRecords?'badge-success':'badge-warning'}">${hasCostRecords?'实际成本（发货时记录）':'估算（当前库存成本）'}</span>
      </div>
      <table>
        <thead><tr><th>产品</th><th>数量</th><th>销售单价</th><th>销售收入</th><th>成本单价</th><th>销售成本</th><th>毛利润</th><th>毛利率</th></tr></thead>
        <tbody>${detailRows.join('')}</tbody>
        <tfoot><tr style="font-weight:700;border-top:2px solid var(--border);">
          <td>合计</td><td></td><td></td>
          <td style="color:var(--success);">${fmtMoney(totalSale)}</td>
          <td></td>
          <td style="color:var(--danger);">${fmtMoney(totalCost)}</td>
          <td style="color:${totalProfit>=0?'var(--success)':'var(--danger)'};font-size:15px;">${totalProfit>=0?'+':''}${fmtMoney(totalProfit)}</td>
          <td><span style="color:${Number(totalRate)>=0?'var(--success)':'var(--danger)'};">${totalRate}%</span></td>
        </tr></tfoot>
      </table>
    `);
  };

  window.showStockFlowDetail = function(productName, month) {
    const allFlow = DB.get('stockFlow') || [];
    const materialWhIds = DB.get('warehouses').filter(w => w.type === 'material').map(w => w.id);
    const flows = allFlow.filter(f => {
      if(!f.date || f.date.slice(0,7) !== month) return false;
      if(f.productName !== productName) return false;
      if(materialWhIds.length > 0 && !materialWhIds.includes(f.warehouseId)) return false;
      return true;
    });
    // 按时间倒序
    flows.sort((a,b) => new Date(b.date) - new Date(a.date));
    const typeLabel = { purchase:'采购入库', purchase_reverse:'采购反审', production:'生产领料', production_reverse:'生产反审', outsource_send:'外协发出', outsource_send_reverse:'外协发出反审', outsource_return:'外协收回', outsource_return_reverse:'外协收回反审', production_complete:'完工入库', sale:'销售发货', sale_reverse:'销售反审', manual_adjust:'手动调整' };
    let sumIn=0, sumOut=0;
    const rows = flows.map(f => {
      if(f.type==='in') sumIn += f.amount; else sumOut += f.amount;
      return `<tr>
        <td>${fmtDate(f.date)}</td>
        <td><span class="badge ${f.type==='in'?'badge-success':'badge-danger'}">${f.type==='in'?'入库':'出库'}</span></td>
        <td>${f.warehouseName||'-'}</td>
        <td>${f.quantity}</td>
        <td>${fmtMoney(f.unitCost)}</td>
        <td style="color:${f.type==='in'?'var(--success)':'var(--danger)'};font-weight:600;">${fmtMoney(f.amount)}</td>
        <td>${typeLabel[f.sourceType]||f.sourceType||'-'}</td>
        <td>${f.sourceNo||'-'}</td>
      </tr>`;
    }).join('');
    openModal(productName + ' - 出入库流水（' + month + '）', `
      <div style="margin-bottom:12px;display:flex;gap:20px;font-size:13px;">
        <span>入库合计：<strong style="color:var(--success);">${fmtMoney(sumIn)}</strong></span>
        <span>出库合计：<strong style="color:var(--danger);">${fmtMoney(sumOut)}</strong></span>
        <span>净变动：<strong style="color:${sumIn-sumOut>=0?'var(--success)':'var(--danger)'};">${(sumIn-sumOut)>=0?'+':''}${fmtMoney(sumIn-sumOut)}</strong></span>
      </div>
      <div class="table-wrapper" style="max-height:400px;overflow-y:auto;">
        <table>
          <thead style="position:sticky;top:0;background:var(--bg-white);z-index:1;">
            <tr><th>时间</th><th>类型</th><th>仓库</th><th>数量</th><th>单价</th><th>金额</th><th>来源</th><th>单号</th></tr>
          </thead>
          <tbody>${rows || '<tr><td colspan="8"><div class="empty-state"><p>暂无流水记录</p></div></td></tr>'}</tbody>
        </table>
      </div>
    `, `<button class="btn btn-outline" onclick="closeModal()">关闭</button>`, '900px');
  };

  window.printFinance = function() { window.print(); };
  render();
}


// ========== 开票管理 ==========
function renderInvoice(el) {
    const sales = DB.get('sales');
    const customers = DB.get('customers');
    const invoices = DB.get('invoices');
    const invoicedSaleIds = new Set(invoices.filter(i => i.saleOrderId).map(i => i.saleOrderId));

  function render() {
    let list = [...invoices].sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
    // 统计
    const totalInvoiced = list.reduce((s,i) => s + (Number(i.amount)||0), 0);
    // 待开票 = 已发货/已结清 但未开票的销售单金额
    const invoicedSaleIds = new Set(list.filter(i => i.saleOrderId).map(i => i.saleOrderId));
    const pendingInvoice = sales.filter(s => (s.status === 'shipped' || s.status === 'completed') && !invoicedSaleIds.has(s.id)).reduce((s,o) => s + (Number(o.totalAmount)||0), 0);

    el.innerHTML = `
      <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);">
        <div class="stat-card">
          <div class="stat-icon blue">🧾</div>
